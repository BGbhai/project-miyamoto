    window.addEventListener('unhandledrejection', function(e) {

    });
    // CDN guard — run after all CDN scripts, before Babel script

const ACCENT_PRESETS = {

};
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function toNum(v, fallback = 0) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function slugify(value) {
  return String(value || 'item')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');
}

function cx(...parts) {
  return parts.flat().filter(Boolean).join(' ');
}

function isMicroBreakSession(sessionLike) {
  const prescription = sessionLike?.prescription || sessionLike || {};
  return prescription.sessionVariant === 'micro-break' || prescription.source === 'micro-break';
}

function isCountedTrainingSession(sessionLike) {
  if (!sessionLike) return false;
  const prescription = sessionLike?.prescription || sessionLike || {};
  if (typeof prescription.countsTowardTraining === 'boolean') return prescription.countsTowardTraining;
  return !isMicroBreakSession(sessionLike);
}

function getCountedTrainingLogs(logs = []) {
  return (logs || []).filter(log => isCountedTrainingSession(log));
}

function getResetActivityLogs(logs = []) {
  return (logs || []).filter(log => isMicroBreakSession(log));
}

function createMuscleRecovery() {
  const MUSCLE_RECOVERY_HOURS = {
    quads: 72, hamstrings: 72, glutes: 72, chest: 48, back: 72,
    shoulders: 48, arms: 48, core: 24, lowerBack: 72, hipFlexors: 48,
    calves: 48, fullBody: 72,
  };
  return Object.fromEntries(
    Object.entries(MUSCLE_RECOVERY_HOURS).map(([muscle, hours]) => [
      muscle,
      { lastTrained: null, recoveryHours: hours, status: 'fresh' }
    ])
  );
}

function getMuscleStatus(muscleEntry) {
  if (!muscleEntry.lastTrained) return 'fresh';
  const hoursSince = (Date.now() - new Date(muscleEntry.lastTrained).getTime()) / 3600000;
  const pct = hoursSince / muscleEntry.recoveryHours;
  if (pct >= 1) return 'fresh';
  if (pct >= 0.5) return 'recovering';
  return 'fatigued';
}

function updateMuscleRecovery(muscleRecovery, exercises) {
  const updated = { ...muscleRecovery };
  const now = new Date().toISOString();
  for (const ex of exercises || []) {
    for (const muscle of ex.muscles || []) {
      if (muscle === 'fullBody') {
        // update all muscles
        for (const key of Object.keys(updated)) {
          updated[key] = { ...updated[key], lastTrained: now };
        }
      } else if (updated[muscle]) {
        updated[muscle] = { ...updated[muscle], lastTrained: now };
      }
    }
  }
  // recompute status
  return Object.fromEntries(
    Object.entries(updated).map(([k, v]) => [k, { ...v, status: getMuscleStatus(v) }])
  );
}

function getMuscleRecoveryAdvice(muscleRecovery) {
  const entries = Object.entries(muscleRecovery || {});
  const fatigued = entries.filter(([, v]) => v.status === 'fatigued').map(([k]) => k);
  const recovering = entries.filter(([, v]) => v.status === 'recovering').map(([k]) => k);
  const total = entries.length || 1;
  const score = Math.round(((total - fatigued.length - recovering.length * 0.5) / total) * 100);
  return { fatiguedMuscles: fatigued, recoveringMuscles: recovering, recoveryScore: clamp(score, 0, 100) };
}

function normalizeGeminiModel(model) {
  const mappedModel = GEMINI_LEGACY_MODEL_MAP[model] || model;
  return GEMINI_ALLOWED_MODELS.includes(mappedModel) ? mappedModel : GEMINI_DEFAULT_MODEL;
}

function buildGeminiEndpoint(model) {
  const normalizedModel = normalizeGeminiModel(model);
  return `https://generativelanguage.googleapis.com/v1beta/models/${normalizedModel}:generateContent`;
}

function sleepMs(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function parseRetryAfterSeconds(value) {
  if (!value) return null;
  const seconds = Number(value);
  if (Number.isFinite(seconds) && seconds >= 0) return Math.round(seconds);
  const ts = Date.parse(value);
  if (!Number.isFinite(ts)) return null;
  const delta = Math.ceil((ts - Date.now()) / 1000);
  return delta > 0 ? delta : null;
}

function parseGeminiError(res, payload, requestType = 'Gemini request') {
  const status = res?.status || 0;
  const retryAfterSeconds = parseRetryAfterSeconds(res?.headers?.get('retry-after'));
  const payloadMsg = typeof payload === 'string'
    ? payload
    : (payload?.error?.message || payload?.message || '');
  const apiCode = payload?.error?.status || payload?.error?.code || null;

  let message = `${requestType} failed (${status || 'network'}).`;
  if (status === 429) {
    message = retryAfterSeconds
      ? `Rate limit hit (429). Retry in ~${retryAfterSeconds}s.`
      : 'Rate limit hit (429). Please wait a bit and retry.';
  } else if (status === 503) {
    message = 'Gemini service is temporarily unavailable (503). Retrying may help.';
  } else if (status === 403) {
    message = 'Gemini access denied (403). Check API key permissions and billing/quota.';
  } else if (status === 400) {
    message = 'Gemini rejected the request (400).';
  }
  if (payloadMsg) message = `${message} ${payloadMsg}`.trim();

  const err = new Error(message);
  err.status = status;
  err.code = apiCode;
  err.retryAfterSeconds = retryAfterSeconds;
  err.payload = payload;
  return err;
}

function createGeminiParseError(requestType = 'response', rawText = '', failureType = 'invalid_json', source = 'primary') {
  const baseMessage = failureType === 'blocked_or_empty'
    ? `Gemini ${requestType} parse error: empty or blocked payload.`
    : `Gemini ${requestType} parse error: invalid JSON payload.`;
  const err = new Error(baseMessage);
  err.name = 'GeminiParseError';
  err.isGeminiParseError = true;
  err.failureType = failureType;
  err.source = source;
  err.rawTextSnippet = String(rawText || '').replace(/\s+/g, ' ').slice(0, 200);
  return err;
}

function fallbackModelForParse(selectedModel) {
  const normalized = normalizeGeminiModel(selectedModel);
  return GEMINI_ALLOWED_MODELS
    .filter(model => model !== normalized)
    .sort((a, b) => (COACH_MODEL_PRIORITY[b] || 0) - (COACH_MODEL_PRIORITY[a] || 0))[0] || null;
}

function normalizeModelRankings(rawRankings = []) {
  const seen = new Set();
  const next = [];
  (Array.isArray(rawRankings) ? rawRankings : []).forEach(model => {
    const normalized = normalizeGeminiModel(model);
    if (!normalized || seen.has(normalized)) return;
    seen.add(normalized);
    next.push(normalized);
  });
  GEMINI_ALLOWED_MODELS
    .slice()
    .sort((a, b) => (COACH_MODEL_PRIORITY[b] || 0) - (COACH_MODEL_PRIORITY[a] || 0))
    .forEach(model => {
      if (seen.has(model)) return;
      seen.add(model);
      next.push(model);
    });
  return next;
}

function normalizeModelHealthMap(raw = {}) {
  const next = {};
  GEMINI_ALLOWED_MODELS.forEach(model => {
    const entry = raw?.[model];
    next[model] = {
      successCount: clamp(toNum(entry?.successCount, 0), 0, 100000),
      failureCount: clamp(toNum(entry?.failureCount, 0), 0, 100000),
      recentFailureCount: clamp(toNum(entry?.recentFailureCount, 0), 0, 100000),
      lastFailureReason: String(entry?.lastFailureReason || '').trim(),
      lastFailureKind: String(entry?.lastFailureKind || '').trim(),
      lastFailureAt: entry?.lastFailureAt || null,
      lastSuccessAt: entry?.lastSuccessAt || null,
    };
  });
  return next;
}

function getModelHealthEntry(aiConfig, model) {
  return normalizeModelHealthMap(aiConfig?.modelHealth || {})[normalizeGeminiModel(model)];
}

function scoreModelCandidate(aiConfig, model, nowMs = Date.now()) {
  const normalized = normalizeGeminiModel(model);
  const base = COACH_MODEL_PRIORITY[normalized] || 0;
  const health = getModelHealthEntry(aiConfig, normalized);
  const lastFailureAt = health?.lastFailureAt ? new Date(health.lastFailureAt).getTime() : 0;
  const lastSuccessAt = health?.lastSuccessAt ? new Date(health.lastSuccessAt).getTime() : 0;
  const failureStillRelevant = lastFailureAt && (!lastSuccessAt || lastFailureAt >= lastSuccessAt) && (nowMs - lastFailureAt) < MODEL_FAILURE_DEMOTION_WINDOW_MS;
  const penalty = failureStillRelevant ? Math.min(health.recentFailureCount || 1, 4) * 8 : 0;
  return base - penalty;
}

function getQualityRankedModelChain(aiConfig, primaryModel) {
  const normalizedPrimary = normalizeGeminiModel(primaryModel || aiConfig?.model || GEMINI_DEFAULT_MODEL);
  const rankings = normalizeModelRankings(aiConfig?.modelRankings || []);
  const remaining = rankings
    .filter(model => model !== normalizedPrimary)
    .sort((a, b) => scoreModelCandidate(aiConfig, b) - scoreModelCandidate(aiConfig, a));
  return [normalizedPrimary, ...remaining];
}

function applyModelAttemptHistory(aiConfig, attempts = []) {
  if (!attempts.length) return aiConfig;
  const nextHealth = normalizeModelHealthMap(aiConfig?.modelHealth || {});
  let lastSuccessfulModel = aiConfig?.lastSuccessfulModel || null;
  attempts.forEach(entry => {
    const model = normalizeGeminiModel(entry?.model || '');
    if (!model || !nextHealth[model]) return;
    const current = nextHealth[model];
    if (entry.outcome === 'success') {
      nextHealth[model] = {
        ...current,
        successCount: current.successCount + 1,
        recentFailureCount: 0,
        lastSuccessAt: entry.at || new Date().toISOString(),
      };
      lastSuccessfulModel = model;
      return;
    }
    nextHealth[model] = {
      ...current,
      failureCount: current.failureCount + 1,
      recentFailureCount: current.recentFailureCount + 1,
      lastFailureReason: String(entry.reason || '').trim(),
      lastFailureKind: String(entry.kind || '').trim(),
      lastFailureAt: entry.at || new Date().toISOString(),
    };
  });
  return {
    ...aiConfig,
    modelHealth: nextHealth,
    lastSuccessfulModel,
  };
}

function classifyCoachAIError(err) {
  const message = String(err?.message || '').trim();
  if (!message && !err?.status && !err?.isGeminiParseError) {
    return { kind: 'unknown', reason: 'Unknown AI failure.', recoverable: true };
  }
  if (!err) return { kind: 'unknown', reason: 'Unknown AI failure.', recoverable: true };
  if (/Gemini API key missing/i.test(message) || err?.status === 403) {
    return { kind: 'auth', reason: message || 'Gemini auth failure.', recoverable: false };
  }
  if (err?.isGeminiParseError) {
    return { kind: 'structured_output', reason: message || 'Structured output failure.', recoverable: true };
  }
  if (/timed out|failed \((?:429|503|network)\)|Rate limit hit|temporarily unavailable/i.test(message) || err?.isTimeout || err?.status === 429 || err?.status === 503) {
    return { kind: 'transport', reason: message || 'Transport failure.', recoverable: true };
  }
  if (/equipment that is not available|conflicts with active injury guardrails|invalid coach payload|no usable session items|empty coach chat payload|invalid coach chat payload/i.test(message)) {
    return { kind: 'semantic', reason: message, recoverable: true };
  }
  if (err?.status === 400) {
    return { kind: 'request_rejected', reason: message || 'Model rejected the request.', recoverable: true };
  }
  return { kind: 'unknown', reason: message || 'Unknown AI failure.', recoverable: true };
}

function extractGeminiText(payload) {
  const candidates = Array.isArray(payload?.candidates) ? payload.candidates : [];
  const textParts = [];
  for (const candidate of candidates) {
    const parts = Array.isArray(candidate?.content?.parts) ? candidate.content.parts : [];
    for (const part of parts) {
      if (typeof part?.text === 'string' && part.text.trim()) textParts.push(part.text);
    }
  }
  if (textParts.length) return textParts.join('\n');
  return typeof payload?.text === 'string' ? payload.text : '';
}

function sanitizeGeminiText(text) {
  return String(text || '')
    .replace(/```(?:json)?\s*/gi, '')
    .replace(/```/g, '')
    .trim();
}

function extractFirstJSONObject(text) {
  let depth = 0;
  let start = -1;
  let inString = false;
  let escaped = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inString) {
      if (escaped) {
        escaped = false;
      } else if (ch === '\\') {
        escaped = true;
      } else if (ch === '"') {
        inString = false;
      }
      continue;
    }

    if (ch === '"') {
      inString = true;
      continue;
    }
    if (ch === '{') {
      if (depth === 0) start = i;
      depth++;
      continue;
    }
    if (ch === '}') {
      if (depth > 0) depth--;
      if (depth === 0 && start !== -1) return text.slice(start, i + 1);
    }
  }

  return null;
}

function parseGeminiJson(text, requestType = 'response') {
  const clean = sanitizeGeminiText(text);
  if (!clean) throw createGeminiParseError(requestType, text, 'blocked_or_empty');

  try {
    return JSON.parse(clean);
  } catch (firstErr) {
    const extracted = extractFirstJSONObject(clean);
    if (extracted) {
      try {
        return JSON.parse(extracted);
      } catch (secondErr) {
        throw createGeminiParseError(requestType, clean, 'invalid_json');
      }
    }
    throw createGeminiParseError(requestType, clean, 'invalid_json');
  }
}

function buildStructuredRepairBody({ schema, originalPrompt, rawText, requestLabel, maxOutputTokens = 1800 }) {
  const boundedPrompt = String(originalPrompt || '').slice(0, 6000);
  const boundedRaw = String(rawText || '').slice(0, 6000);
  const prompt = `Repair the RAW MODEL OUTPUT into strict JSON for ${requestLabel}.

Rules:
- Return JSON only. No markdown, no explanations.
- Follow the TARGET SCHEMA exactly.
- If a string field is unknown, use an empty string.
- If a numeric field is unknown, use 0.
- If a list field is unknown, use [].
- Keep identifiers and place/program names aligned with the ORIGINAL REQUEST.

ORIGINAL REQUEST:
${boundedPrompt}

TARGET SCHEMA:
${JSON.stringify(schema, null, 2)}

RAW MODEL OUTPUT:
${boundedRaw}`;

  return {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      temperature: 0,
      maxOutputTokens,
      responseMimeType: 'application/json',
      responseSchema: schema,
    },
  };
}

function logGeminiStructuredFailure(requestType, err) {
  if (!err?.isGeminiParseError) return;
  console.warn(`${requestType} structured parse failed: ${err.failureType || 'invalid_json'}`, {
    source: err.source || 'primary',
    snippet: err.rawTextSnippet || '',
  });
}

async function runStructuredGeminiAttempt({
  apiKey,
  endpoint,
  body,
  requestType,
  parseResult,
  source,
  timeoutMs = null,
  retryDelaysMs = GEMINI_RETRY_DELAYS_MS,
  maxRetryAfterMs = Number.POSITIVE_INFINITY,
}) {
  const data = await callGeminiWithRetry({
    apiKey,
    endpoint,
    body,
    requestType,
    timeoutMs,
    retryDelaysMs,
    maxRetryAfterMs,
  });
  const text = extractGeminiText(data);
  try {
    return {
      text,
      result: parseResult(text, source),
      parseError: null,
    };
  } catch (err) {
    if (!err?.isGeminiParseError) throw err;
    err.source = source;
    err.failureType = err.failureType || 'invalid_json';
    logGeminiStructuredFailure(requestType, err);
    return {
      text,
      result: null,
      parseError: err,
    };
  }
}

async function callGeminiStructuredWithRepair({
  apiKey,
  model,
  endpoint,
  primaryBody,
  requestType,
  parseResult,
  buildRepairBody,
  timeoutMs = null,
  retryDelaysMs = GEMINI_RETRY_DELAYS_MS,
  maxRetryAfterMs = Number.POSITIVE_INFINITY,
}) {
  const primaryAttempt = await runStructuredGeminiAttempt({
    apiKey,
    endpoint,
    body: primaryBody,
    requestType,
    parseResult,
    source: 'primary',
    timeoutMs,
    retryDelaysMs,
    maxRetryAfterMs,
  });
  if (primaryAttempt.result) return primaryAttempt.result;

  const parseFailures = [primaryAttempt.parseError].filter(Boolean);
  const repairAttempt = await runStructuredGeminiAttempt({
    apiKey,
    endpoint,
    body: buildRepairBody(primaryAttempt.text || ''),
    requestType: `${requestType} JSON repair`,
    parseResult,
    source: 'repair',
    timeoutMs,
    retryDelaysMs,
    maxRetryAfterMs,
  });
  if (repairAttempt.result) return repairAttempt.result;
  if (repairAttempt.parseError) parseFailures.push(repairAttempt.parseError);

  const fallbackModel = fallbackModelForParse(model);
  if (fallbackModel) {
    const fallbackAttempt = await runStructuredGeminiAttempt({
      apiKey,
      endpoint: buildGeminiEndpoint(fallbackModel),
      body: primaryBody,
      requestType: `${requestType} (${fallbackModel})`,
      parseResult,
      source: 'model_fallback',
      timeoutMs,
      retryDelaysMs,
      maxRetryAfterMs,
    });
    if (fallbackAttempt.result) return fallbackAttempt.result;
    if (fallbackAttempt.parseError) parseFailures.push(fallbackAttempt.parseError);
  }

  throw parseFailures[parseFailures.length - 1]
    || createGeminiParseError(requestType, primaryAttempt.text, 'invalid_json', 'primary');
}

async function callGeminiStructuredAcrossModels({
  aiConfig,
  requestType,
  buildPrimaryBody,
  parseResult,
  buildRepairBody,
  timeoutMs = null,
  retryDelaysMs = GEMINI_RETRY_DELAYS_MS,
  maxRetryAfterMs = Number.POSITIVE_INFINITY,
}) {
  const primaryModel = normalizeGeminiModel(aiConfig?.model || GEMINI_DEFAULT_MODEL);
  const chain = getQualityRankedModelChain(aiConfig, primaryModel);
  const attempts = [];
  let lastError = null;

  for (let index = 0; index < chain.length; index++) {
    const model = chain[index];
    try {
      const result = await callGeminiStructuredWithRepair({
        apiKey: aiConfig?.apiKey,
        model,
        endpoint: buildGeminiEndpoint(model),
        primaryBody: buildPrimaryBody(model),
        requestType: index === 0 ? requestType : `${requestType} (${model})`,
        parseResult: (text, source) => parseResult(text, source, model),
        buildRepairBody: (rawText) => buildRepairBody(rawText, model),
        timeoutMs,
        retryDelaysMs,
        maxRetryAfterMs,
      });
      attempts.push({
        model,
        outcome: 'success',
        kind: 'ok',
        reason: '',
        at: new Date().toISOString(),
      });
      return {
        result,
        modelUsed: model,
        usedFallback: index > 0,
        attempts,
      };
    } catch (err) {
      const classified = classifyCoachAIError(err);
      attempts.push({
        model,
        outcome: 'failure',
        kind: classified.kind,
        reason: classified.reason,
        at: new Date().toISOString(),
      });
      lastError = err;
      if (!classified.recoverable || index === chain.length - 1) break;
    }
  }

  if (lastError) {
    lastError.modelAttempts = attempts;
    lastError.lastModelTried = attempts[attempts.length - 1]?.model || primaryModel;
  }
  throw lastError || new Error(`${requestType} failed.`);
}

async function callGeminiTextAcrossModels({
  aiConfig,
  requestType,
  buildBody,
  timeoutMs = null,
  retryDelaysMs = GEMINI_RETRY_DELAYS_MS,
  maxRetryAfterMs = Number.POSITIVE_INFINITY,
}) {
  const primaryModel = normalizeGeminiModel(aiConfig?.model || GEMINI_DEFAULT_MODEL);
  const chain = getQualityRankedModelChain(aiConfig, primaryModel);
  const attempts = [];
  let lastError = null;

  for (let index = 0; index < chain.length; index++) {
    const model = chain[index];
    try {
      const data = await callGeminiWithRetry({
        apiKey: aiConfig?.apiKey,
        endpoint: buildGeminiEndpoint(model),
        body: buildBody(model),
        requestType: index === 0 ? requestType : `${requestType} (${model})`,
        timeoutMs,
        retryDelaysMs,
        maxRetryAfterMs,
      });
      const text = sanitizeGeminiText(extractGeminiText(data));
      if (!text) throw createGeminiParseError(requestType, '', 'blocked_or_empty', index === 0 ? 'primary' : 'model_fallback');
      attempts.push({
        model,
        outcome: 'success',
        kind: 'ok',
        reason: '',
        at: new Date().toISOString(),
      });
      return {
        text,
        modelUsed: model,
        usedFallback: index > 0,
        attempts,
      };
    } catch (err) {
      const classified = classifyCoachAIError(err);
      attempts.push({
        model,
        outcome: 'failure',
        kind: classified.kind,
        reason: classified.reason,
        at: new Date().toISOString(),
      });
      lastError = err;
      if (!classified.recoverable || index === chain.length - 1) break;
    }
  }

  if (lastError) {
    lastError.modelAttempts = attempts;
    lastError.lastModelTried = attempts[attempts.length - 1]?.model || primaryModel;
  }
  throw lastError || new Error(`${requestType} failed.`);
}

async function callGeminiWithRetry({
  apiKey,
  endpoint,
  body,
  requestType = 'Gemini request',
  timeoutMs = null,
  retryDelaysMs = GEMINI_RETRY_DELAYS_MS,
  maxRetryAfterMs = Number.POSITIVE_INFINITY,
}) {
  if (!apiKey) throw new Error('Gemini API key missing.');
  const delays = Array.isArray(retryDelaysMs) && retryDelaysMs.length
    ? retryDelaysMs.map(ms => Math.max(0, toNum(ms, 0)))
    : GEMINI_RETRY_DELAYS_MS;
  const maxRetryIndex = delays.length;
  const hasTimeout = Number.isFinite(timeoutMs) && timeoutMs > 0;
  const boundedMaxRetryAfterMs = Number.isFinite(maxRetryAfterMs) && maxRetryAfterMs >= 0
    ? maxRetryAfterMs
    : Number.POSITIVE_INFINITY;

  for (let attempt = 0; attempt <= maxRetryIndex; attempt++) {
    try {
      const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
      const timeoutId = hasTimeout && controller
        ? setTimeout(() => controller.abort(), timeoutMs)
        : null;
      let res;
      try {
        res = await fetch(`${endpoint}?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller?.signal,
        });
      } finally {
        if (timeoutId) clearTimeout(timeoutId);
      }

      if (res.ok) return await res.json();

      let payload = null;
      try {
        payload = await res.json();
      } catch (jsonErr) {
        try {
          payload = await res.text();
        } catch (textErr) {
          payload = null;
        }
      }

      const err = parseGeminiError(res, payload, requestType);
      const isTransient = res.status === 429 || res.status === 503;
      if (!isTransient || attempt === maxRetryIndex) throw err;

      const jitter = Math.floor(Math.random() * 501);
      const retryAfterMsRaw = err.retryAfterSeconds ? err.retryAfterSeconds * 1000 : 0;
      const retryAfterMs = Math.min(retryAfterMsRaw, boundedMaxRetryAfterMs);
      const baseDelayMs = delays[attempt] ?? delays[delays.length - 1] ?? 0;
      const waitMs = Math.max(baseDelayMs + jitter, retryAfterMs);
      await sleepMs(waitMs);
    } catch (error) {
      const isAbort = error?.name === 'AbortError';
      const transformedError = isAbort
        ? Object.assign(new Error(`${requestType} timed out${hasTimeout ? ` after ${Math.round(timeoutMs)}ms` : ''}.`), {
            status: 0,
            code: 'TIMEOUT',
            failureType: 'timeout',
            isTimeout: true,
          })
        : error;
      const isNetwork = transformedError instanceof TypeError || transformedError?.name === 'TypeError';
      if (!(isNetwork || isAbort) || attempt === maxRetryIndex) throw transformedError;
      const jitter = Math.floor(Math.random() * 501);
      const baseDelayMs = delays[attempt] ?? delays[delays.length - 1] ?? 0;
      await sleepMs(baseDelayMs + jitter);
    }
  }

  throw new Error(`${requestType} failed after retries.`);
}

function getReadinessBand(score) {
  if (score >= 75) return 'high';
  if (score >= 50) return 'moderate';
  return 'low';
}

function calculateReadiness(inputs) {
  const sleep = clamp(toNum(inputs.sleep, 7), 1, 10);
  const stress = clamp(toNum(inputs.stress, 4), 1, 10);
  const soreness = clamp(toNum(inputs.soreness, 3), 1, 10);
  const motivation = clamp(toNum(inputs.motivation, 7), 1, 10);
  const energy = clamp(toNum(inputs.energy, 7), 1, 10);
  const subjective = ((sleep * 2.6) + ((11 - stress) * 2.2) + ((11 - soreness) * 1.8) + (motivation * 1.7) + (energy * 1.7)) / 10;

  const hrvDelta = toNum(inputs.hrvDelta, 0);
  const restingHrDelta = toNum(inputs.restingHrDelta, 0);
  const wearableAdj = clamp((hrvDelta * 1.5) - (restingHrDelta * 1.2), -12, 12);

  const score = clamp(Math.round(subjective + wearableAdj), 0, 100);
  return { score, band: getReadinessBand(score) };
}

function toTitleCase(value) {
  return String(value || '')
    .split(/\s+/)
    .filter(Boolean)
    .map(part => part.charAt(0).toUpperCase() + part.slice(1))
    .join(' ');
}

function normalizeEquipmentText(raw) {
  const tokens = String(raw || '')
    .split(/[\n,;]+/)
    .map(item => String(item || '').trim().toLowerCase().replace(/\s+/g, ' '))
    .filter(Boolean)
    .map(item => COACH_EQUIPMENT_ALIAS_MAP[item] || item);
  const seen = new Set();
  return tokens
    .map(item => {
      const key = slugify(item);
      if (!key || seen.has(key)) return null;
      seen.add(key);
      return { key, label: toTitleCase(item) };
    })
    .filter(Boolean)
    .slice(0, 80);
}

function normalizeEquipmentRequirementKey(value) {
  const raw = String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');

  };

function isClockValue(value) {
  return /^\d{2}:\d{2}$/.test(String(value || ''));
}

function isValidWindow(windowLike) {
  if (!windowLike) return false;
  const start = String(windowLike.start || '');
  const end = String(windowLike.end || '');
  return isClockValue(start) && isClockValue(end) && start < end;
}

function normalizeWeeklyAvailability(raw = null) {
  const base = {};
  COACH_DAY_KEYS.forEach(day => {
    const rows = Array.isArray(raw?.[day]) ? raw[day] : [];
    base[day] = rows
      .map(row => ({ start: String(row?.start || '').slice(0, 5), end: String(row?.end || '').slice(0, 5) }))
      .filter(isValidWindow)
      .slice(0, 6);
  });
  return base;
}

function formatAvailabilityWindows(windows = []) {
  return (windows || []).map(windowLike => `${windowLike.start}-${windowLike.end}`).join(', ');
}

function parseAvailabilityInput(text) {
  return String(text || '')
    .split(',')
    .map(chunk => chunk.trim())
    .filter(Boolean)
    .map(chunk => {
      const match = chunk.match(/^(\d{2}:\d{2})\s*-\s*(\d{2}:\d{2})$/);
      if (!match) return null;
      return { start: match[1], end: match[2] };
    })
    .filter(isValidWindow)
    .slice(0, 6);
}

function timeToMinutes(value) {
  const [hours, minutes] = String(value || '00:00').split(':').map(Number);
  return (Number(hours) || 0) * 60 + (Number(minutes) || 0);
}

function getCoachDayKey(date = new Date()) {
  return COACH_DAY_KEYS[(date.getDay() + 6) % 7];
}

function isPlaceAvailableNow(place, now = new Date()) {
  if (!place) return false;
  if (place.availabilityOverride === 'available') return true;
  if (place.availabilityOverride === 'unavailable') return false;
  const dayKey = getCoachDayKey(now);
  const windows = place.weeklyAvailability?.[dayKey] || [];
  const minutes = now.getHours() * 60 + now.getMinutes();
  return windows.some(windowLike => {
    const start = timeToMinutes(windowLike.start);
    const end = timeToMinutes(windowLike.end);
    return minutes >= start && minutes < end;
  });
}

function getAvailabilityLabel(place, now = new Date()) {
  if (!place) return 'Unknown';
  if (place.availabilityOverride === 'available') return 'Forced Available';
  if (place.availabilityOverride === 'unavailable') return 'Forced Unavailable';
  return isPlaceAvailableNow(place, now) ? 'Available Now' : 'Unavailable Now';
}

    const payload = {
      capturedAt: new Date().toISOString(),
      sourceKey: LEGACY_STORAGE_KEY,
      raw: rawLegacyState,

    localStorage.setItem(COACH_LEGACY_BACKUP_KEY, JSON.stringify(payload));
    return {
      available: true,
      capturedAt: payload.capturedAt,
      sourceKey: payload.sourceKey,

  if (!raw || typeof raw !== 'object') return base;
  const programs = Array.isArray(raw?.programs?.items) ? raw.programs.items.map(normalizeProgramItem) : [];
  const places = Array.isArray(raw?.places?.items) ? raw.places.items.map(normalizePlaceItem) : [];
  const stateForNormalization = {
    ...base,
    programs: { items: programs, updatedAt: raw?.programs?.updatedAt || null },
    places: { items: places, updatedAt: raw?.places?.updatedAt || null },
  };
  const coachInputs = {
    ...base.coachContext.inputs,
    ...(raw?.coachContext?.inputs || {}),
    availableMinutes: clamp(toNum(raw?.coachContext?.inputs?.availableMinutes, base.coachContext.inputs.availableMinutes), 5, 240),
    sittingLoad: COACH_SITTING_LOAD_OPTIONS.includes(raw?.coachContext?.inputs?.sittingLoad)
      ? raw.coachContext.inputs.sittingLoad
      : base.coachContext.inputs.sittingLoad,
  };
  const normalizedModel = normalizeGeminiModel(raw?.aiConfig?.model || base.aiConfig.model);
  const normalizedAI = {
    ...base.aiConfig,
    ...(raw?.aiConfig || {}),
    model: normalizedModel,
    planningModel: normalizedModel,
    endpoint: buildGeminiEndpoint(normalizedModel),
    fallbackPolicy: raw?.aiConfig?.fallbackPolicy === 'best_other_available' ? 'best_other_available' : base.aiConfig.fallbackPolicy,
    modelRankings: normalizeModelRankings(raw?.aiConfig?.modelRankings || base.aiConfig.modelRankings),
    modelHealth: normalizeModelHealthMap(raw?.aiConfig?.modelHealth || base.aiConfig.modelHealth),
    lastSuccessfulModel: raw?.aiConfig?.lastSuccessfulModel ? normalizeGeminiModel(raw.aiConfig.lastSuccessfulModel) : null,
  };
  return {
    ...base,
    ...raw,
    version: COACH_STATE_VERSION,
    view: ['today', 'chat', 'train', 'insights', 'history', 'settings'].includes(raw?.view) ? raw.view : 'today',
    setupComplete: raw?.setupComplete !== undefined ? !!raw.setupComplete : (programs.length > 0 && places.length > 0),
    setupStep: clamp(toNum(raw?.setupStep, 0), 0, 3),
    profile: {
      ...base.profile,
      ...(raw?.profile || {}),
      injuries: {
        ...base.profile.injuries,
        ...(raw?.profile?.injuries || {}),
      },
      sessionCount: clamp(toNum(raw?.profile?.sessionCount, 0), 0, 100000),
    },
    programConfig: {
      ...base.programConfig,
      ...(raw?.programConfig || {}),
      accentPreset: raw?.programConfig?.accentPreset && ACCENT_PRESETS[raw.programConfig.accentPreset]
        ? raw.programConfig.accentPreset
        : base.programConfig.accentPreset,
      accentHex: raw?.programConfig?.accentHex || base.programConfig.accentHex,
    },
    programs: {
      items: programs,
      updatedAt: raw?.programs?.updatedAt || null,
    },
    places: {
      items: places,
      updatedAt: raw?.places?.updatedAt || null,
    },
    coachContext: {
      inputs: coachInputs,
      readiness: calculateReadiness(coachInputs),
      lastUpdatedAt: raw?.coachContext?.lastUpdatedAt || null,
    },
    coachPlan: {
      ...createCoachPlanState(),
      ...(raw?.coachPlan || {}),
      recommendation: normalizeRecommendation(raw?.coachPlan?.recommendation),
      pendingPlaceResolution: raw?.coachPlan?.pendingPlaceResolution || null,
    },
    coachRoadmap: {
      ...createCoachRoadmapState(),
      ...(raw?.coachRoadmap || {}),
      programForecasts: Array.isArray(raw?.coachRoadmap?.programForecasts)
        ? raw.coachRoadmap.programForecasts.map(normalizeCoachProgramForecast).filter(Boolean)
        : [],
      roadmapChanges: Array.isArray(raw?.coachRoadmap?.roadmapChanges) ? raw.coachRoadmap.roadmapChanges : [],
      horizonWeeks: clamp(toNum(raw?.coachRoadmap?.horizonWeeks, ROADMAP_HORIZON_WEEKS), 4, ROADMAP_HORIZON_WEEKS),
      sourceSignature: raw?.coachRoadmap?.sourceSignature || null,
      aiRefreshSignature: raw?.coachRoadmap?.aiRefreshSignature || null,
      lastModelUsed: raw?.coachRoadmap?.lastModelUsed ? normalizeGeminiModel(raw.coachRoadmap.lastModelUsed) : null,
      usedFallback: !!raw?.coachRoadmap?.usedFallback,
    },
    coachChat: {
      ...createCoachChatState(),
      ...(raw?.coachChat || {}),
      messages: (Array.isArray(raw?.coachChat?.messages) ? raw.coachChat.messages.map(normalizeCoachChatMessage).filter(Boolean) : []).slice(-120),
      pendingProposal: normalizeCoachChatProposal(raw?.coachChat?.pendingProposal, stateForNormalization),
      lastGeneratedRecommendationId: raw?.coachChat?.lastGeneratedRecommendationId || null,
      loading: !!raw?.coachChat?.loading,
      error: raw?.coachChat?.error || null,
    },
    coachAuditLog: (Array.isArray(raw?.coachAuditLog) ? raw.coachAuditLog.map(normalizeAuditEntry).filter(Boolean) : []).slice(0, 160),
    aiConfig: normalizedAI,
    activeSession: normalizeActiveSession(raw?.activeSession),
    sessionLogs: (Array.isArray(raw?.sessionLogs) ? raw.sessionLogs.map(normalizeSessionLog).filter(Boolean) : []),
    postSessionSummary: raw?.postSessionSummary || null,
    muscleRecovery: raw?.muscleRecovery || base.muscleRecovery,
    legacyBackupMeta: raw?.legacyBackupMeta || readLegacyBackupMeta(),
  };
}

function hydrateCoachState() {
  const base = createCoachState();
  try {
    const saved = localStorage.getItem(COACH_STORAGE_KEY);
    if (saved) return normalizeCoachState(JSON.parse(saved), base);
    const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
    if (legacy) {
      const rawLegacyState = JSON.parse(legacy);
      const legacyBackupMeta = stashLegacyBackup(rawLegacyState);
      const prefill = extractLegacyPrefill(rawLegacyState);
      return normalizeCoachState({
        ...base,
        profile: { ...base.profile, ...prefill.profile },
        aiConfig: { ...base.aiConfig, ...prefill.aiConfig },
        legacyBackupMeta,
      }, base);
    }
  } catch (err) {
    console.warn('Coach state hydration failed:', err?.message || err);
  }
  return base;
}

function getProgramItems(state) {
  return Array.isArray(state?.programs?.items) ? state.programs.items : [];
}

function getActivePrograms(state) {
  return getProgramItems(state).filter(item => item?.active !== false);
}

function getProgramById(state, programId) {
  return getProgramItems(state).find(item => item.id === programId) || null;
}

function getPlaceItems(state) {
  return Array.isArray(state?.places?.items) ? state.places.items : [];
}

function getPlaceMap(state) {
  return Object.fromEntries(getPlaceItems(state).map(item => [item.id, item]));
}

function getPlaceById(state, placeId) {
  return getPlaceItems(state).find(item => item.id === placeId) || null;
}

function resolveCoachProgramRef(state, ref) {
  const raw = String(ref || '').trim();
  if (!raw) return null;
  const key = slugify(raw);
  return getProgramItems(state).find(item => item.id === raw || slugify(item.name) === key) || null;
}

function resolveCoachPlaceRef(state, ref) {
  const raw = String(ref || '').trim();
  if (!raw) return null;
  const key = slugify(raw);
  return getPlaceItems(state).find(item => item.id === raw || slugify(item.name) === key) || null;
}

function getEffectivePlaceEquipment(place) {
  const blocked = new Set((place?.unavailableEquipmentNormalized || []).map(item => item.key));
  return (place?.equipmentNormalized || []).filter(item => !blocked.has(item.key));
}

function getCoachTrainingLogs(state) {
  return (state?.sessionLogs || []).filter(log => !!log?.countsTowardTraining);
}

function getCoachResetLogs(state) {
  return (state?.sessionLogs || []).filter(log => !log?.countsTowardTraining);
}

function getRecentCoachLogs(state, limit = 6) {
  return [...(state?.sessionLogs || [])].slice(-limit).reverse();
}

function moveItem(array = [], from, to) {
  const next = [...array];
  const [removed] = next.splice(from, 1);
  if (!removed) return array;
  next.splice(to, 0, removed);
  return next;
}

function parseAreaTextToMuscles(text) {
  const lower = String(text || '').toLowerCase();
  const results = new Set();
  const matchers = [
    ['quads', /quad|thigh|leg front|knee/i],
    ['hamstrings', /hamstring|posterior chain/i],
    ['glutes', /glute|hip|hips|butt/i],
    ['hipFlexors', /hip flexor|groin|front hip/i],
    ['calves', /calf|ankle/i],
    ['lowerBack', /lower back|back/i],
    ['back', /mid back|upper back|thoracic|lat/i],
    ['shoulders', /shoulder|scap/i],
    ['chest', /chest|pec/i],
    ['arms', /arm|elbow|bicep|tricep/i],
    ['core', /core|abs|trunk/i],
  ];
  matchers.forEach(([muscle, pattern]) => {
    if (pattern.test(lower)) results.add(muscle);
  });
  return Array.from(results);
}

function getCoachRecoverySummary(state) {
  const advice = getMuscleRecoveryAdvice(state?.muscleRecovery || {});
  const pains = parseAreaTextToMuscles(state?.coachContext?.inputs?.painAreas || '');
  const stiffness = parseAreaTextToMuscles(state?.coachContext?.inputs?.stiffnessAreas || '');
  const targetMuscles = Array.from(new Set([...pains, ...stiffness, ...(advice.fatiguedMuscles || []), ...(advice.recoveringMuscles || [])]));
  return {
    ...advice,
    pains,
    stiffness,
    targetMuscles,
  };
}

function parseProgramLevelValue(value) {
  const numeric = parseFloat(String(value || '').replace(/[^\d.]+/g, ''));
  return Number.isFinite(numeric) ? numeric : null;
}

function addDays(date, days) {
  const next = new Date(date);
  next.setDate(next.getDate() + days);
  return next;
}

function getCoachWeekStart(date = new Date()) {
  const next = new Date(date);
  next.setHours(0, 0, 0, 0);
  const day = (next.getDay() + 6) % 7;
  next.setDate(next.getDate() - day);
  return next;
}

function toISODateOnly(value) {
  const date = value instanceof Date ? value : new Date(value);
  if (!Number.isFinite(date.getTime())) return '';
  return date.toISOString().slice(0, 10);
}

function formatCoachDateRange(lowDate, highDate) {
  if (!lowDate && !highDate) return 'No forecast yet';
  const low = lowDate ? new Date(lowDate).toLocaleDateString() : 'now';
  const high = highDate ? new Date(highDate).toLocaleDateString() : low;
  return low === high ? low : `${low} - ${high}`;
}

function getProgramIntent(program) {
  const raw = `${program?.name || ''} ${program?.goal || ''} ${program?.coachingNotes || ''}`.toLowerCase();
  if (/mobility|recover|reset|flexib|range/i.test(raw)) return 'mobility';
  if (/run|endurance|cardio|aerobic/i.test(raw)) return 'endurance';
  if (/bjj|jiu|boxing|muay|martial|wrest|grappl|kick/i.test(raw)) return 'combat';
  if (/calisthenics|pull-up|handstand|bodyweight|ring/i.test(raw)) return 'calisthenics';
  return 'strength';
}

function formatProgramTargetSummary(program) {
  const targetLabel = program?.targetType === 'milestone' ? 'Milestone' : 'Level';
  const current = String(program?.currentLevel || '').trim() || 'current not set';
  const target = String(program?.targetLevel || '').trim() || 'target not set';
  return `${targetLabel}: ${current} -> ${target} · ${program?.weeklyTargetSessions || 3} sessions/week`;
}

function getProgramTrainingLogs(state, programId) {
  return getCoachTrainingLogs(state).filter(log => log.programId === programId);
}

function countLogsBetween(logs = [], startDate, endDate) {
  const startMs = new Date(startDate).getTime();
  const endMs = new Date(endDate).getTime();
  return logs.filter(log => {
    const completedAt = new Date(log?.completedAt || log?.generatedAt || 0).getTime();
    return Number.isFinite(completedAt) && completedAt >= startMs && completedAt < endMs;
  }).length;
}

function getRecommendationMissSignal(state, programId = null) {
  const recommendation = state?.coachPlan?.recommendation;
  if (!recommendation || state?.activeSession) return false;
  if (programId && recommendation.programId && recommendation.programId !== programId) return false;
  const generatedAt = recommendation.generatedAt ? new Date(recommendation.generatedAt) : null;
  if (!generatedAt || !Number.isFinite(generatedAt.getTime())) return false;
  const todayStart = new Date();
  todayStart.setHours(0, 0, 0, 0);
  return generatedAt.getTime() < todayStart.getTime();
}

function buildRoadmapPhaseBlocks(program, adherenceScore, readiness) {
  const intent = getProgramIntent(program);
  const startLabel = adherenceScore < 0.7 ? 'Rebuild' : 'Build';
  const midLabel = intent === 'mobility' ? 'Expand Range' : intent === 'combat' ? 'Sharpen' : 'Progress';
  const endLabel = program?.targetType === 'milestone' ? 'Milestone Push' : 'Consolidate';
  const readinessNote = readiness.band === 'low' ? 'volume capped until readiness stabilizes' : 'normal progression';
  return [
    { id: `${program.id}_phase_1`, label: startLabel, focus: `${intent} base · ${readinessNote}`, weeks: '1-4' },
    { id: `${program.id}_phase_2`, label: midLabel, focus: `${intent} progression and skill quality`, weeks: '5-8' },
    { id: `${program.id}_phase_3`, label: endLabel, focus: `${intent} execution toward target`, weeks: '9-12' },
  ];
}

function getCurrentPhaseFromForecast(forecast, weekOffset = 0) {
  const blocks = Array.isArray(forecast?.phaseBlocks) ? forecast.phaseBlocks : [];
  if (!blocks.length) return null;
  if (weekOffset < 4) return blocks[0];
  if (weekOffset < 8) return blocks[1] || blocks[0];
  return blocks[2] || blocks[blocks.length - 1];
}

function buildWeeklyIntentsForProgram(state, program, phaseBlocks, targetSessions, completedLogs = []) {
  const start = getCoachWeekStart(new Date());
  return Array.from({ length: ROADMAP_HORIZON_WEEKS }, (_, index) => {
    const weekStart = addDays(start, index * 7);
    const weekEnd = addDays(weekStart, 7);
    const completedSessions = countLogsBetween(completedLogs, weekStart, weekEnd);
    const phase = getCurrentPhaseFromForecast({ phaseBlocks }, index);
    const status = index === 0
      ? (completedSessions >= targetSessions ? 'on_track' : 'current')
      : completedSessions >= targetSessions
        ? 'done'
        : weekStart < new Date()
          ? 'missed'
          : 'upcoming';
    return {
      weekIndex: index + 1,
      label: `Week ${index + 1}`,
      startDate: toISODateOnly(weekStart),
      endDate: toISODateOnly(addDays(weekEnd, -1)),
      focus: phase?.focus || (program?.goal || 'General progression'),
      targetSessions,
      completedSessions,
      status,
    };
  });
}

function buildLocalProgramForecast(state, program, reason = 'refresh') {
  const readiness = state?.coachContext?.readiness || calculateReadiness(state?.coachContext?.inputs || {});
  const logs = getProgramTrainingLogs(state, program.id);
  const recentResetCount = getCoachResetLogs(state).filter(log => {
    const completedAt = new Date(log.completedAt || log.generatedAt || 0).getTime();
    return Number.isFinite(completedAt) && completedAt >= Date.now() - (14 * 24 * 60 * 60 * 1000);
  }).length;
  const recentLogs = logs.filter(log => {
    const completedAt = new Date(log.completedAt || log.generatedAt || 0).getTime();
    return Number.isFinite(completedAt) && completedAt >= Date.now() - (28 * 24 * 60 * 60 * 1000);
  });
  const weeklyTarget = clamp(toNum(program?.weeklyTargetSessions, 3), 1, 14);
  const adherenceScore = clamp(recentLogs.length / Math.max(weeklyTarget * 4, 1), 0, 1.25);
  const currentLevel = parseProgramLevelValue(program?.currentLevel);
  const targetLevel = parseProgramLevelValue(program?.targetLevel);
  const levelGap = currentLevel !== null && targetLevel !== null
    ? Math.max(targetLevel - currentLevel, 0.5)
    : 1.5;
  const readinessFactor = readiness.band === 'high' ? 0.9 : readiness.band === 'moderate' ? 1 : 1.25;
  const driftPenalty = getRecommendationMissSignal(state, program.id) ? 1.2 : 1;
  const recoveryPenalty = getCoachRecoverySummary(state).fatiguedMuscles.length > 3 ? 1.15 : 1;
  const resetPenalty = recentResetCount > recentLogs.length ? 1.15 : 1;
  const sessionsRatio = weeklyTarget >= 4 ? 0.88 : weeklyTarget === 3 ? 1 : 1.12;
  const baseWeeks = program?.targetType === 'milestone'
    ? 6
    : Math.max(3, Math.round(levelGap * 4));
  const lowWeeks = Math.max(2, Math.round(baseWeeks * readinessFactor * sessionsRatio * Math.max(0.85, 1.1 - (adherenceScore * 0.25))));
  const highWeeks = Math.max(lowWeeks + 2, Math.round(baseWeeks * driftPenalty * recoveryPenalty * resetPenalty * Math.max(1.15, 1.7 - (adherenceScore * 0.35))));
  const today = new Date();
  const etaLowDate = toISODateOnly(addDays(today, lowWeeks * 7));
  const etaHighDate = toISODateOnly(addDays(today, highWeeks * 7));
  const phaseBlocks = buildRoadmapPhaseBlocks(program, adherenceScore, readiness);
  const weeklyIntents = buildWeeklyIntentsForProgram(state, program, phaseBlocks, weeklyTarget, logs);
  const currentWeek = weeklyIntents[0] || null;
  const nextMilestone = program?.targetType === 'milestone'
    ? (String(program?.targetLevel || '').trim() || program?.successCriteria || 'Next milestone')
    : `Reach ${String(program?.targetLevel || '').trim() || 'the next level'}`;
  const driftStatus = adherenceScore >= 0.9 && !getRecommendationMissSignal(state, program.id)
    ? 'stable'
    : adherenceScore >= 0.7 && recentResetCount <= recentLogs.length
      ? 'watch'
      : 'slipping';
  const confidence = clamp(Math.round((adherenceScore * 55) + (readiness.score * 0.35)), 35, 96);
  const forecastNotes = driftStatus === 'stable'
    ? 'Training is roughly on track. Keep weekly volume steady and use desk resets to protect quality on low-readiness days.'
    : driftStatus === 'watch'
      ? 'Timeline is still reachable, but recent adherence/readiness is softening the forecast. Prioritize the current week intent.'
      : 'The roadmap is slipping. Expect a wider ETA window until weekly completion stabilizes.';
  return {
    programId: program.id,
    etaLowDate,
    etaHighDate,
    confidence,
    nextMilestone,
    phaseBlocks,
    weeklyIntents,
    adherenceScore: clamp(Math.round(adherenceScore * 100), 0, 125),
    forecastNotes,
    driftStatus,
    currentWeek,
    reforecastReason: reason,
  };
}

function buildLocalCoachRoadmap(state, reason = 'refresh') {
  const forecasts = getActivePrograms(state).map(program => buildLocalProgramForecast(state, program, reason));
  const driftOrder = { stable: 0, watch: 1, slipping: 2 };
  const dominantDrift = forecasts.reduce((current, forecast) => {
    return driftOrder[forecast.driftStatus] > driftOrder[current] ? forecast.driftStatus : current;
  }, 'stable');
  const nextMilestones = forecasts.map(forecast => {
    const program = getProgramById(state, forecast.programId);
    return `${program?.name || 'Program'}: ${forecast.nextMilestone} (${formatCoachDateRange(forecast.etaLowDate, forecast.etaHighDate)})`;
  });
  return {
    loading: false,
    error: null,
    summary: nextMilestones.length
      ? `12-week roadmap active. ${nextMilestones.slice(0, 2).join(' · ')}`
      : 'Add a program to generate a progression roadmap.',
    updatedAt: new Date().toISOString(),
    horizonWeeks: ROADMAP_HORIZON_WEEKS,
    lastReforecastReason: reason,
    driftStatus: dominantDrift,
    programForecasts: forecasts,
    sourceSignature: null,
    aiRefreshSignature: null,
    lastModelUsed: state?.coachRoadmap?.lastModelUsed || null,
    usedFallback: !!state?.coachRoadmap?.usedFallback,
    roadmapChanges: state?.coachRoadmap?.roadmapChanges || [],
  };
}

function buildLocalRoadmapSourceSignature(state) {
  const logs = Array.isArray(state?.sessionLogs) ? state.sessionLogs : [];
  const readiness = state?.coachContext?.readiness || calculateReadiness(state?.coachContext?.inputs || {});
  const recommendation = state?.coachPlan?.recommendation;
  return JSON.stringify({
    programsUpdatedAt: state?.programs?.updatedAt || null,
    placesUpdatedAt: state?.places?.updatedAt || null,
    logsCount: logs.length,
    lastLogAt: logs[logs.length - 1]?.completedAt || null,
    readinessBand: readiness.band,
    readinessBucket: Math.round(readiness.score / 10),
    recommendationDate: recommendation?.generatedAt ? toISODateOnly(recommendation.generatedAt) : null,
    activeSession: !!state?.activeSession,
  });
}

function buildRoadmapAIRefreshSignature(state) {
  const logs = Array.isArray(state?.sessionLogs) ? state.sessionLogs : [];
  return JSON.stringify({
    programsUpdatedAt: state?.programs?.updatedAt || null,
    placesUpdatedAt: state?.places?.updatedAt || null,
    logsCount: logs.length,
    lastLogAt: logs[logs.length - 1]?.completedAt || null,
    model: state?.aiConfig?.model || GEMINI_DEFAULT_MODEL,
  });
}

function shouldRefreshRoadmapAI(state, aiRefreshSignature) {
  if (!state?.setupComplete) return false;
  if (!state?.aiConfig?.enabled || !state?.aiConfig?.apiKey) return false;
  if (getActivePrograms(state).length === 0) return false;
  if (state?.coachRoadmap?.loading) return false;
  if (!aiRefreshSignature) return false;
  if (state?.coachRoadmap?.aiRefreshSignature !== aiRefreshSignature) return true;
  if (!state?.coachRoadmap?.updatedAt) return true;
  return (Date.now() - new Date(state.coachRoadmap.updatedAt).getTime()) > ROADMAP_AI_REFRESH_COOLDOWN_MS;
}

function getRoadmapForecastForProgram(state, programId) {
  return (state?.coachRoadmap?.programForecasts || []).find(forecast => forecast.programId === programId) || null;
}

function getRoadmapSnapshotForProgram(state, programId) {
  const forecast = getRoadmapForecastForProgram(state, programId);
  if (!forecast) return null;
  return {
    ...forecast,
    etaLabel: formatCoachDateRange(forecast.etaLowDate, forecast.etaHighDate),
    currentPhase: getCurrentPhaseFromForecast(forecast, 0),
    thisWeek: forecast.currentWeek || forecast.weeklyIntents?.[0] || null,
  };
}

function buildRoadmapSummaryPrompt(state) {
  const forecasts = (state?.coachRoadmap?.programForecasts || []).map(forecast => {
    const program = getProgramById(state, forecast.programId);
    const phase = getCurrentPhaseFromForecast(forecast, 0);
    return `- ${program?.name || forecast.programId}: nextMilestone=${forecast.nextMilestone}; eta=${formatCoachDateRange(forecast.etaLowDate, forecast.etaHighDate)}; confidence=${forecast.confidence}; drift=${forecast.driftStatus}; phase=${phase?.label || 'none'}; weeklyTarget=${forecast.currentWeek?.targetSessions || 0}; completedThisWeek=${forecast.currentWeek?.completedSessions || 0}`;
  });
  return forecasts.join('\n') || '- no roadmap yet';
}

function buildRoadmapRefreshReason(state, previousRoadmap = null) {
  if (!previousRoadmap?.updatedAt) return 'initial_roadmap';
  if (state.programs?.updatedAt && state.programs.updatedAt > (previousRoadmap.updatedAt || '')) return 'programs_changed';
  if (state.places?.updatedAt && state.places.updatedAt > (previousRoadmap.updatedAt || '')) return 'places_changed';
  if (state.sessionLogs?.length) {
    const lastLog = state.sessionLogs[state.sessionLogs.length - 1];
    if ((lastLog?.completedAt || '') > (previousRoadmap.updatedAt || '')) return 'session_completed';
  }
  if (getRecommendationMissSignal(state)) return 'missed_daily_plan';
  return 'readiness_shift';
}

function buildConstrainedRoadmapFallback(state, request, program, place) {
  const forecast = getRoadmapForecastForProgram(state, program?.id);
  const intent = getProgramIntent(program);
  const equipmentKeys = new Set(getEffectivePlaceEquipment(place).map(item => item.key));
  const canBarbell = equipmentKeys.has('barbell') && equipmentKeys.has('rack');
  const canDumbbell = equipmentKeys.has('dumbbell');
  const canPull = equipmentKeys.has('pull-up-bar') || equipmentKeys.has('gymnastic-rings');
  const phaseLabel = forecast?.phaseBlocks?.[0]?.label || 'Current phase';
  if (request.variant === 'desk_reset') return buildSafeResetFallback(state, request, place, 'Constrained roadmap fallback used.');
  const items = [];
  if (intent === 'strength' && canBarbell) {
    items.push(
      {
        name: 'Primary Strength Lift',
        instructions: 'Choose the main barbell pattern that best fits today. Keep 2-3 reps in reserve and stop before form degrades.',
        sets: 4, reps: '4-6', duration: '', targetEffort: 7,
        musclesPrimary: ['quads', 'glutes'], musclesSecondary: ['core'],
        equipmentNeeded: ['barbell', 'rack'], movementTags: ['strength', 'compound'],
        contraindications: ['skip painful range'], recoveryIntent: 'prime', placeSuitability: [place?.name || 'Selected place'],
      },
      {
        name: 'Secondary Upper-Body Strength',
        instructions: 'Pair a controlled press or row with stable tempo. Leave one strong rep in the tank.',
        sets: 3, reps: '6-8', duration: '', targetEffort: 7,
        musclesPrimary: ['back', 'chest'], musclesSecondary: ['arms'],
        equipmentNeeded: canDumbbell ? ['dumbbell'] : ['barbell'], movementTags: ['strength', 'upper-body'],
        contraindications: ['avoid painful shoulder range'], recoveryIntent: 'reload', placeSuitability: [place?.name || 'Selected place'],
      }
    );
  } else if (intent === 'calisthenics' && canPull) {
    items.push(

function getProgramSummary(program, placeMap = {}) {
  const preferred = (program?.preferredPlaceIds || []).map(id => placeMap[id]?.name).filter(Boolean).join(' → ');
  return preferred || 'No preferred places yet';
}

function summarizeRecentCoachLog(log) {
  const tags = (log?.tags || []).slice(0, 4).join(', ') || 'none';
  const muscles = (log?.targetMuscles || []).slice(0, 4).join(', ') || 'none';
  const dateLabel = new Date(log?.completedAt || log?.generatedAt || Date.now()).toLocaleDateString();
  return `${dateLabel} · ${log?.variant || 'session'} · ${log?.programName || 'Coach'} @ ${log?.placeName || 'Unknown'} · tags=${tags} · muscles=${muscles} · RPE=${log?.rpe || '?'}`;
}

function summarizeCoachCurrentFocus(state) {
  if (state?.activeSession) {
    const session = state.activeSession;
    return `Active session: ${session.summary || session.programName || 'Coach session'} at ${session.placeName || 'unknown place'} (${session.variant || 'session'})`;
  }
  if (state?.coachPlan?.recommendation) {
    const rec = state.coachPlan.recommendation;
    return `Current recommendation: ${rec.summary || rec.programName || 'Coach recommendation'} at ${rec.placeName || 'unknown place'} (${rec.variant || 'session'})`;
  }
  return 'No active session or pending recommendation.';
}

function buildProgramsPrompt(state) {
  const placeMap = getPlaceMap(state);
  return getActivePrograms(state).map(program => (
    `- id=${program.id}; name=${program.name}; goal=${program.goal || 'none'}; targetType=${program.targetType}; currentLevel=${program.currentLevel || 'unset'}; targetLevel=${program.targetLevel || 'unset'}; successCriteria=${program.successCriteria || 'unset'}; weeklyTargetSessions=${program.weeklyTargetSessions || 3}; preferredPlaces=${(program.preferredPlaceIds || []).map(id => placeMap[id]?.name || id).join(' > ') || 'none'}; coachingNotes=${program.coachingNotes || 'none'}`
  )).join('\n') || '- none';
}

function buildPlacesPrompt(state, now = new Date()) {
  return getPlaceItems(state).map(place => {
    const equipment = getEffectivePlaceEquipment(place);
    return `- id=${place.id}; name=${place.name}; availability=${getAvailabilityLabel(place, now)}; note=${place.note || 'none'}; equipmentLabels=${equipment.map(item => item.label).join(', ') || 'bodyweight only'}; equipmentKeys=${equipment.map(item => item.key).join(', ') || 'bodyweight'}; unavailableEquipment=${(place.unavailableEquipmentNormalized || []).map(item => item.label).join(', ') || 'none'}`;

}
