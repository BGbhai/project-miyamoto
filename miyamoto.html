function normalizeCoachChangeList(state, rawChanges = [], options = {}) {
  const allowedTypes = Array.isArray(options.allowedTypes) ? new Set(options.allowedTypes) : null;
  const changes = [];
  (Array.isArray(rawChanges) ? rawChanges : []).slice(0, 8).forEach(rawChange => {
    const type = String(rawChange?.type || '').trim();
    if (!type || (allowedTypes && !allowedTypes.has(type))) return;

    if (type === 'program_note') {
      const program = resolveCoachProgramRef(state, rawChange?.programId || rawChange?.programName);
      const note = String(rawChange?.note || '').trim();
      const reason = String(rawChange?.reason || '').trim();
      if (!program || !note || note === String(program.coachingNotes || '').trim()) return;
      changes.push({ type, programId: program.id, note, reason });
      return;
    }

    if (type === 'program_place_preferences') {
      const program = resolveCoachProgramRef(state, rawChange?.programId || rawChange?.programName);
      const preferredPlaceIds = Array.isArray(rawChange?.preferredPlaceIds)
        ? rawChange.preferredPlaceIds
            .map(placeRef => resolveCoachPlaceRef(state, placeRef)?.id || null)
            .filter(Boolean)
            .filter((placeId, idx, arr) => arr.indexOf(placeId) === idx)
        : [];
      const reason = String(rawChange?.reason || '').trim();
      if (!program || !preferredPlaceIds.length) return;
      if (JSON.stringify(preferredPlaceIds) === JSON.stringify(program.preferredPlaceIds || [])) return;
      changes.push({ type, programId: program.id, preferredPlaceIds, reason });
      return;
    }

    if (type === 'place_availability_override') {
      const place = resolveCoachPlaceRef(state, rawChange?.placeId || rawChange?.placeName);
      const value = COACH_PLACE_OVERRIDE_OPTIONS.includes(rawChange?.value)
        ? rawChange.value
        : (COACH_PLACE_OVERRIDE_OPTIONS.includes(rawChange?.availabilityOverride) ? rawChange.availabilityOverride : null);
      const reason = String(rawChange?.reason || '').trim();
      if (!place || !value || value === place.availabilityOverride) return;
      changes.push({ type, placeId: place.id, value, reason });
      return;
    }

    if (type === 'place_equipment_update') {
      const place = resolveCoachPlaceRef(state, rawChange?.placeId || rawChange?.placeName);
      const hasRaw = Object.prototype.hasOwnProperty.call(rawChange || {}, 'raw')
        || Object.prototype.hasOwnProperty.call(rawChange || {}, 'equipmentRaw')
        || Object.prototype.hasOwnProperty.call(rawChange || {}, 'equipment');
      if (!place || !hasRaw) return;
      const raw = String(rawChange?.raw ?? rawChange?.equipmentRaw ?? rawChange?.equipment ?? '').trim();
      const reason = String(rawChange?.reason || '').trim();
      if (raw === String(place.equipmentRaw || '').trim()) return;
      changes.push({ type, placeId: place.id, raw, reason });
      return;
    }

    if (type === 'place_unavailable_equipment_update') {
      const place = resolveCoachPlaceRef(state, rawChange?.placeId || rawChange?.placeName);
      const hasRaw = Object.prototype.hasOwnProperty.call(rawChange || {}, 'raw')
        || Object.prototype.hasOwnProperty.call(rawChange || {}, 'unavailableEquipmentRaw')
        || Object.prototype.hasOwnProperty.call(rawChange || {}, 'equipment');
      if (!place || !hasRaw) return;
      const raw = String(rawChange?.raw ?? rawChange?.unavailableEquipmentRaw ?? rawChange?.equipment ?? '').trim();
      const reason = String(rawChange?.reason || '').trim();
      if (raw === String(place.unavailableEquipmentRaw || '').trim()) return;
      changes.push({ type, placeId: place.id, raw, reason });
    }
  });
  return changes;
}

function createAuditEntryForCoachChange(change, state) {
  if (!change) return null;
  if (change.type === 'program_note') {
    const program = getProgramById(state, change.programId);
    if (!program) return null;
    return createAuditEntry({
      type: 'program_note',
      title: `Coach note updated for ${program.name}`,
      detail: change.reason || change.note,
      source: 'ai',
      reasonCode: 'program_note_update',
    });
  }
  if (change.type === 'program_place_preferences') {
    const program = getProgramById(state, change.programId);
    if (!program) return null;
    return createAuditEntry({
      type: 'program_place_preferences',
      title: `Coach reordered places for ${program.name}`,
      detail: change.reason || `New place order: ${change.preferredPlaceIds.map(placeId => getPlaceById(state, placeId)?.name || placeId).join(' → ')}`,
      source: 'ai',
      reasonCode: 'program_place_preference_update',
    });
  }
  if (change.type === 'place_availability_override') {
    const place = getPlaceById(state, change.placeId);
    if (!place) return null;
    return createAuditEntry({
      type: 'place_availability_override',
      title: `Coach updated availability for ${place.name}`,
      detail: change.reason || `Availability override set to ${toTitleCase(change.value)}.`,
      source: 'ai',
      reasonCode: 'place_availability_override',
    });
  }
  if (change.type === 'place_equipment_update') {
    const place = getPlaceById(state, change.placeId);
    if (!place) return null;
    return createAuditEntry({
      type: 'place_equipment_update',
      title: `Coach updated equipment for ${place.name}`,
      detail: change.reason || (change.raw ? `Equipment set: ${change.raw}` : 'Cleared equipment inventory.'),
      source: 'ai',
      reasonCode: 'place_equipment_update',
    });
  }
  if (change.type === 'place_unavailable_equipment_update') {
    const place = getPlaceById(state, change.placeId);
    if (!place) return null;
    return createAuditEntry({
      type: 'place_unavailable_equipment_update',
      title: `Coach updated blocked equipment for ${place.name}`,
      detail: change.reason || (change.raw ? `Temporarily blocked: ${change.raw}` : 'Cleared temporarily unavailable equipment list.'),
      source: 'ai',
      reasonCode: 'place_unavailable_equipment_update',
    });
  }
  return null;
}

function describeCoachChange(change, state) {
  if (!change) return { title: 'Coach change', detail: '' };
  if (change.type === 'program_note') {
    const program = getProgramById(state, change.programId);
    return {
      title: `Program note for ${program?.name || 'program'}`,
      detail: change.reason || change.note,
    };
  }
  if (change.type === 'program_place_preferences') {
    const program = getProgramById(state, change.programId);
    return {
      title: `Preferred places for ${program?.name || 'program'}`,
      detail: change.reason || change.preferredPlaceIds.map(placeId => getPlaceById(state, placeId)?.name || placeId).join(' → '),
    };
  }
  if (change.type === 'place_availability_override') {
    const place = getPlaceById(state, change.placeId);
    return {
      title: `Availability override for ${place?.name || 'place'}`,
      detail: change.reason || toTitleCase(change.value),
    };
  }
  if (change.type === 'place_equipment_update') {
    const place = getPlaceById(state, change.placeId);
    return {
      title: `Equipment inventory for ${place?.name || 'place'}`,
      detail: change.reason || (change.raw || 'Clear equipment inventory'),
    };
  }
  if (change.type === 'place_unavailable_equipment_update') {
    const place = getPlaceById(state, change.placeId);
    return {
      title: `Blocked equipment for ${place?.name || 'place'}`,
      detail: change.reason || (change.raw || 'Clear blocked equipment list'),
    };
  }
  return { title: 'Coach change', detail: '' };
}

function createCoachChatProposal(changes = []) {
  return {
    id: `coach_proposal_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
    createdAt: new Date().toISOString(),
    changes,
  };
}

function normalizeCoachChatProposal(rawProposal, state) {
  if (!rawProposal || typeof rawProposal !== 'object') return null;
  const changes = normalizeCoachChangeList(state, rawProposal.changes || []);
  if (!changes.length) return null;
  return {
    id: rawProposal.id || `coach_proposal_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
    createdAt: rawProposal.createdAt || new Date().toISOString(),
    changes,
  };
}

function buildCoachChatActionSummary(sessionRequest, proposal) {
  const parts = [];
  if (sessionRequest) parts.push(sessionRequest.variant === 'desk_reset' ? 'Desk reset requested' : 'Workout requested');
  if (proposal?.changes?.length) parts.push(`${proposal.changes.length} setup change${proposal.changes.length === 1 ? '' : 's'} pending`);
  return parts.join(' · ');
}

function normalizeCoachSessionRequest(state, rawAction) {
  if (!rawAction || typeof rawAction !== 'object') return null;
  const variant = rawAction.variant === 'desk_reset' ? 'desk_reset' : 'workout';
  const program = rawAction.programId ? resolveCoachProgramRef(state, rawAction.programId) : null;
  const place = rawAction.placeId ? resolveCoachPlaceRef(state, rawAction.placeId) : null;
  if (rawAction.programId && !program) return null;
  if (rawAction.placeId && !place) return null;
  return {
    variant,
    programId: program?.id || null,
    placeId: place?.id || null,
    requestSource: 'chat',
  };
}

function normalizeCoachChatActions(state, rawActions = []) {
  let sessionRequest = null;
  const structuralActions = [];
  (Array.isArray(rawActions) ? rawActions : []).slice(0, 8).forEach(rawAction => {
    const type = String(rawAction?.type || '').trim();
    if (type === 'generate_session') {
      if (!sessionRequest) sessionRequest = normalizeCoachSessionRequest(state, rawAction);
      return;
    }
    structuralActions.push(rawAction);
  });
  const changes = normalizeCoachChangeList(state, structuralActions);
  const proposal = changes.length ? createCoachChatProposal(changes) : null;
  return {
    sessionRequest,
    proposal,
    actionSummary: buildCoachChatActionSummary(sessionRequest, proposal),
  };
}

function normalizeCoachPlanChanges(state, rawPlanChanges = []) {
  const changes = normalizeCoachChangeList(state, rawPlanChanges, { allowedTypes: ['program_note', 'program_place_preferences'] });
  const programPatches = [];
  const auditEntries = [];
  changes.forEach(change => {
    if (change.type === 'program_note') {
      programPatches.push({ id: change.programId, patch: { coachingNotes: change.note } });
    }
    if (change.type === 'program_place_preferences') {
      programPatches.push({ id: change.programId, patch: { preferredPlaceIds: change.preferredPlaceIds } });
    }
    const auditEntry = createAuditEntryForCoachChange(change, state);
    if (auditEntry) auditEntries.push(auditEntry);
  });
  return { programPatches, auditEntries };
}

function applyCoachChangesToState(state, changes = []) {
  const programItems = getProgramItems(state).map(item => ({ ...item }));
  const placeItems = getPlaceItems(state).map(item => ({ ...item }));
  const programIndex = Object.fromEntries(programItems.map((item, idx) => [item.id, idx]));
  const placeIndex = Object.fromEntries(placeItems.map((item, idx) => [item.id, idx]));
  const auditEntries = [];
  let touchedPrograms = false;
  let touchedPlaces = false;

  changes.forEach(change => {
    if (change.type === 'program_note') {
      const idx = programIndex[change.programId];
      if (idx === undefined) return;
      programItems[idx] = { ...programItems[idx], coachingNotes: change.note };
      touchedPrograms = true;
    }
    if (change.type === 'program_place_preferences') {
      const idx = programIndex[change.programId];
      if (idx === undefined) return;
      programItems[idx] = { ...programItems[idx], preferredPlaceIds: [...change.preferredPlaceIds] };
      touchedPrograms = true;
    }
    if (change.type === 'place_availability_override') {
      const idx = placeIndex[change.placeId];
      if (idx === undefined) return;
      placeItems[idx] = { ...placeItems[idx], availabilityOverride: change.value };
      touchedPlaces = true;
    }
    if (change.type === 'place_equipment_update') {
      const idx = placeIndex[change.placeId];
      if (idx === undefined) return;
      placeItems[idx] = {
        ...placeItems[idx],
        equipmentRaw: change.raw,
        equipmentNormalized: normalizeEquipmentText(change.raw),
      };
      touchedPlaces = true;
    }
    if (change.type === 'place_unavailable_equipment_update') {
      const idx = placeIndex[change.placeId];
      if (idx === undefined) return;
      placeItems[idx] = {
        ...placeItems[idx],
        unavailableEquipmentRaw: change.raw,
        unavailableEquipmentNormalized: normalizeEquipmentText(change.raw),
      };
      touchedPlaces = true;
    }
    const auditEntry = createAuditEntryForCoachChange(change, state);
    if (auditEntry) auditEntries.push(auditEntry);
  });

  return {
    programs: touchedPrograms
      ? { items: programItems, updatedAt: new Date().toISOString() }
      : state.programs,
    places: touchedPlaces
      ? { items: placeItems, updatedAt: new Date().toISOString() }
      : state.places,
    coachAuditLog: auditEntries.length ? appendAuditEntries(state.coachAuditLog, auditEntries) : state.coachAuditLog,
  };
}

function normalizeCoachItem(rawItem, index = 0) {
  if (!rawItem || typeof rawItem !== 'object') return null;
  const name = String(rawItem.name || '').trim();
  const instructions = String(rawItem.instructions || '').trim();
  if (!name || !instructions) return null;
  return {
    id: rawItem.id || `coach_item_${Date.now()}_${index + 1}`,
    name,
    instructions,
    sets: rawItem.sets !== undefined && rawItem.sets !== null ? clamp(toNum(rawItem.sets, 0), 0, 20) : null,
    reps: rawItem.reps !== undefined ? String(rawItem.reps || '').trim() : '',
    duration: rawItem.duration !== undefined ? String(rawItem.duration || '').trim() : '',
    targetEffort: clamp(toNum(rawItem.targetEffort, 5), 1, 10),
    musclesPrimary: Array.isArray(rawItem.musclesPrimary) ? rawItem.musclesPrimary.map(v => String(v || '').trim()).filter(Boolean).slice(0, 6) : [],
    musclesSecondary: Array.isArray(rawItem.musclesSecondary) ? rawItem.musclesSecondary.map(v => String(v || '').trim()).filter(Boolean).slice(0, 6) : [],
    equipmentNeeded: Array.isArray(rawItem.equipmentNeeded) ? rawItem.equipmentNeeded.map(v => String(v || '').trim()).filter(Boolean).slice(0, 8) : [],
    movementTags: Array.isArray(rawItem.movementTags) ? rawItem.movementTags.map(v => String(v || '').trim()).filter(Boolean).slice(0, 8) : [],
    contraindications: Array.isArray(rawItem.contraindications) ? rawItem.contraindications.map(v => String(v || '').trim()).filter(Boolean).slice(0, 6) : [],
    recoveryIntent: String(rawItem.recoveryIntent || '').trim(),
    placeSuitability: Array.isArray(rawItem.placeSuitability) ? rawItem.placeSuitability.map(v => String(v || '').trim()).filter(Boolean).slice(0, 6) : [],
  };
}

function isEquipmentCompatible(item, place) {
  const availableKeys = new Set(getEffectivePlaceEquipment(place).map(entry => entry.key));
  return (item.equipmentNeeded || []).every(requirement => {
    const key = normalizeEquipmentRequirementKey(requirement);
    if (!key) return true;
    if (COACH_FALLBACK_ALLOWED_EQUIPMENT.has(key)) return true;
    return availableKeys.has(key);
  });
}

function isItemSafeForState(item, state) {
  const injuries = state?.profile?.injuries || {};
  const primary = new Set([...(item.musclesPrimary || []), ...(item.musclesSecondary || [])]);
  const tags = new Set((item.movementTags || []).map(tag => slugify(tag)));
  if (injuries.back && (primary.has('lowerBack') || tags.has('hinge'))) return false;
  if (injuries.knee && (primary.has('quads') || primary.has('calves') || tags.has('squat') || tags.has('jump') || tags.has('run'))) return false;
  if (injuries.shoulder && (primary.has('shoulders') || primary.has('chest') || tags.has('press') || tags.has('overhead') || tags.has('strike') || tags.has('hang'))) return false;
  return true;
}

function normalizeCoachRoadmapResponse(raw, state, localRoadmap) {
  if (!raw || typeof raw !== 'object') {
    throw new Error('AI returned an invalid roadmap payload.');
  }
  const localForecasts = Array.isArray(localRoadmap?.programForecasts) ? localRoadmap.programForecasts : [];
  const forecasts = localForecasts.map(localForecast => {
    const rawForecast = (Array.isArray(raw.programForecasts) ? raw.programForecasts : []).find(entry => entry?.programId === localForecast.programId) || {};
    const weeklyIntents = localForecast.weeklyIntents.map(localWeek => {
      const rawWeek = (Array.isArray(rawForecast.weeklyIntents) ? rawForecast.weeklyIntents : []).find(entry => toNum(entry?.weekIndex, 0) === localWeek.weekIndex) || {};
      return {
        ...localWeek,
        focus: String(rawWeek.focus || localWeek.focus || '').trim(),
        targetSessions: clamp(toNum(rawWeek.targetSessions, localWeek.targetSessions), 1, 14),
      };
    });
    const phaseBlocks = (Array.isArray(rawForecast.phaseBlocks) ? rawForecast.phaseBlocks : [])
      .map((block, index) => ({
        id: `${localForecast.programId}_phase_ai_${index + 1}`,
        label: String(block?.label || '').trim(),
        focus: String(block?.focus || '').trim(),
        weeks: String(block?.weeks || '').trim(),
      }))
      .filter(block => block.label && block.focus && block.weeks);
    return {
      ...localForecast,
      etaLowDate: toISODateOnly(rawForecast.etaLowDate || localForecast.etaLowDate) || localForecast.etaLowDate,
      etaHighDate: toISODateOnly(rawForecast.etaHighDate || localForecast.etaHighDate) || localForecast.etaHighDate,
      confidence: clamp(toNum(rawForecast.confidence, localForecast.confidence), 20, 99),
      nextMilestone: String(rawForecast.nextMilestone || localForecast.nextMilestone || '').trim() || localForecast.nextMilestone,
      forecastNotes: String(rawForecast.forecastNotes || localForecast.forecastNotes || '').trim() || localForecast.forecastNotes,
      phaseBlocks: phaseBlocks.length ? phaseBlocks : localForecast.phaseBlocks,
      weeklyIntents,
    };
  });
  return {
    ...localRoadmap,
    summary: String(raw.summary || localRoadmap?.summary || '').trim() || localRoadmap.summary,
    driftStatus: ['stable', 'watch', 'slipping'].includes(raw.driftStatus) ? raw.driftStatus : (localRoadmap?.driftStatus || 'stable'),
    programForecasts: forecasts,
    roadmapChanges: Array.isArray(raw.roadmapChanges) ? raw.roadmapChanges : [],
  };
}

function normalizeCoachPrescription(raw, state, request, program, place) {
  if (!raw || typeof raw !== 'object') {
    throw new Error('AI returned an invalid coach payload.');
  }
  const variant = request.variant === 'desk_reset'
    ? 'desk_reset'
    : (raw.variant === 'desk_reset' ? 'desk_reset' : 'workout');
  const items = (Array.isArray(raw.items) ? raw.items : [])
    .map((item, index) => normalizeCoachItem(item, index))
    .filter(Boolean);
  if (!items.length) throw new Error('AI returned no usable session items.');
  if (items.some(item => !isEquipmentCompatible(item, place))) {
    throw new Error('AI requested equipment that is not available at the selected place.');
  }
  if (items.some(item => !isItemSafeForState(item, state))) {
    throw new Error('AI returned a session that conflicts with active injury guardrails.');
  }
  return {
    variant,
    summary: String(raw.summary || `${variant === 'desk_reset' ? 'Desk Reset' : (program?.name || 'Coach Session')}`).trim(),
    rationale: String(raw.rationale || '').trim(),
    changeSummary: '',
    recoveryIntent: String(raw.recoveryIntent || '').trim(),
    tags: Array.isArray(raw.tags) ? raw.tags.map(tag => String(tag || '').trim()).filter(Boolean).slice(0, 8) : [],
    targetMuscles: Array.isArray(raw.targetMuscles) ? raw.targetMuscles.map(muscle => String(muscle || '').trim()).filter(Boolean).slice(0, 8) : [],
    contraindications: Array.isArray(raw.contraindications) ? raw.contraindications.map(text => String(text || '').trim()).filter(Boolean).slice(0, 6) : [],
    items,
  };
}

async function callCoachPrescriptionAI(state, request, program, place) {
  const prompt = buildCoachPrescriptionPrompt(state, request, program, place);
  const schema = buildCoachPrescriptionSchema();
  const response = await callGeminiStructuredAcrossModels({
    aiConfig: state.aiConfig,
    requestType: request.variant === 'desk_reset' ? 'AI desk reset generation' : 'AI coach session generation',
    buildPrimaryBody: () => ({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: {
        temperature: 0.3,
        maxOutputTokens: 1500,
        responseMimeType: 'application/json',
        responseSchema: schema,
      },
    }),
    parseResult: (text, source) => {
      const clean = sanitizeGeminiText(text);
      if (!clean) throw createGeminiParseError('coach session', text, 'blocked_or_empty', source);
      const parsed = parseGeminiJson(clean, 'coach session');
      return normalizeCoachPrescription(parsed, state, request, program, place);
    },
    buildRepairBody: (rawText) => buildStructuredRepairBody({
      schema,
      originalPrompt: prompt,
      rawText,
      requestLabel: request.variant === 'desk_reset' ? 'MIYAMOTO desk reset prescription' : 'MIYAMOTO coach session prescription',
      maxOutputTokens: 1500,
    }),
    timeoutMs: AI_PLAN_REQUEST_TIMEOUT_MS,
    retryDelaysMs: AI_SESSION_RETRY_DELAYS_MS,
    maxRetryAfterMs: AI_PLAN_MAX_RETRY_AFTER_MS,
  });
  return {
    ...response.result,
    modelUsed: response.modelUsed,
    usedFallback: response.usedFallback,
    modelAttempts: response.attempts,
  };
}

function normalizeCoachChatResponse(raw) {
  if (!raw || typeof raw !== 'object') {
    throw new Error('AI returned an invalid coach chat payload.');
  }
  const reply = String(raw.reply || raw.text || '').trim();
  const actions = Array.isArray(raw.actions) ? raw.actions : [];
  if (!reply && !actions.length) {
    throw new Error('AI returned an empty coach chat payload.');
  }
  return { reply, actions };
}

function isCoachChatStructuredOutputError(err) {
  if (!err) return false;
  return !!err.isGeminiParseError
    || /invalid coach chat payload/i.test(String(err.message || ''))
    || /empty coach chat payload/i.test(String(err.message || ''));
}

async function callCoachChatTextFallback(state, userMessage) {
  const response = await callGeminiTextAcrossModels({
    aiConfig: state.aiConfig,
    requestType: 'Coach chat fallback',
    buildBody: () => ({
      contents: buildCoachChatContents(state, userMessage, 'text'),
      generationConfig: {
        temperature: 0.55,
        maxOutputTokens: 900,
      },
    }),
    timeoutMs: AI_PLAN_REQUEST_TIMEOUT_MS,
    retryDelaysMs: AI_PLAN_RETRY_DELAYS_MS,
    maxRetryAfterMs: AI_PLAN_MAX_RETRY_AFTER_MS,
  });
  return response;
}

async function callCoachChatAI(state, userMessage) {
  const schema = buildCoachChatSchema();
  try {
    const response = await callGeminiStructuredAcrossModels({
      aiConfig: state.aiConfig,
      requestType: 'Coach chat',
      buildPrimaryBody: () => ({
        contents: buildCoachChatContents(state, userMessage, 'json'),
        generationConfig: {
          temperature: 0.35,
          maxOutputTokens: 1200,
          responseMimeType: 'application/json',
          responseSchema: schema,
        },
      }),
      parseResult: (text, source) => {
        const clean = sanitizeGeminiText(text);
        if (!clean) throw createGeminiParseError('coach chat', text, 'blocked_or_empty', source);
        return normalizeCoachChatResponse(parseGeminiJson(clean, 'coach chat'));
      },
      buildRepairBody: (rawText) => buildStructuredRepairBody({
        schema,
        originalPrompt: buildCoachChatSystemPrompt(state, 'json'),
        rawText,
        requestLabel: 'MIYAMOTO coach chat response',
        maxOutputTokens: 1200,
      }),
      timeoutMs: AI_PLAN_REQUEST_TIMEOUT_MS,
      retryDelaysMs: AI_SESSION_RETRY_DELAYS_MS,
      maxRetryAfterMs: AI_PLAN_MAX_RETRY_AFTER_MS,
    });
    return {
      ...response.result,
      modelUsed: response.modelUsed,
      usedFallback: response.usedFallback,
      modelAttempts: response.attempts,
    };
  } catch (err) {
    if (!isCoachChatStructuredOutputError(err)) throw err;
    const fallbackReply = await callCoachChatTextFallback(state, userMessage);
    return {
      reply: fallbackReply.text,
      actions: [],
      modelUsed: fallbackReply.modelUsed,
      usedFallback: fallbackReply.usedFallback,
      modelAttempts: fallbackReply.attempts,
    };
  }
}

async function callCoachRoadmapAI(state, localRoadmap, reason = 'refresh') {

  const response = await callGeminiStructuredAcrossModels({

      generationConfig: {
        temperature: 0.25,
        maxOutputTokens: 2000,
        responseMimeType: 'application/json',
        responseSchema: schema,
      },
    }),
    parseResult: (text, source) => {
      const clean = sanitizeGeminiText(text);
      if (!clean) throw createGeminiParseError('coach roadmap', text, 'blocked_or_empty', source);
      const parsed = parseGeminiJson(clean, 'coach roadmap');

    },
    buildRepairBody: (rawText) => buildStructuredRepairBody({

      maxOutputTokens: 1800,
    }),
    timeoutMs: AI_PLAN_REQUEST_TIMEOUT_MS + 10000,
    retryDelaysMs: AI_ROADMAP_RETRY_DELAYS_MS,
    maxRetryAfterMs: AI_PLAN_MAX_RETRY_AFTER_MS,
  });
  return {
    ...response.result,
    lastModelUsed: response.modelUsed,
    usedFallback: response.usedFallback,
    modelAttempts: response.attempts,
  };
}

function normalizeCoachGenerationFailure(err) {
  const rawMessage = String(err?.message || '').trim();
  if (err?.isGeminiParseError) {
    return {
      kind: 'invalid_structured_output',
      message: 'AI coach returned unusable structured output. Loaded a constrained fallback instead.',
      reason: 'AI coach returned unusable structured output.',
    };
  }
  if (/AI returned an invalid coach payload|AI returned no usable session items/i.test(rawMessage)) {
    return {
      kind: 'invalid_prescription',
      message: 'AI coach returned an invalid session. Loaded a constrained fallback instead.',
      reason: 'AI coach returned an invalid session payload.',
    };
  }
  if (/equipment that is not available|conflicts with active injury guardrails/i.test(rawMessage)) {
    return {
      kind: 'invalid_prescription',
      message: 'AI coach returned a session that failed local safety checks. Loaded a constrained fallback instead.',
      reason: rawMessage,
    };
  }
  if (err?.status || /^Gemini /i.test(rawMessage) || / failed \((?:\d+|network)\)\.?/i.test(rawMessage)) {
    return {
      kind: 'api_failure',
      message: 'AI coach request failed. Loaded a constrained fallback instead.',
      reason: rawMessage || 'AI coach request failed.',
    };
  }
  return {
    kind: 'unknown',
    message: 'AI coach failed. Loaded a constrained fallback instead.',
    reason: rawMessage || 'AI coach failed.',
  };
}

function logCoachGenerationFailure(request, err, failure) {
  const details = {
    requestVariant: request?.variant || 'workout',
    kind: failure.kind,
    message: err?.message || failure.message,
  };
  if (err?.isGeminiParseError) {
    details.failureType = err.failureType || 'invalid_json';
    details.source = err.source || 'primary';
    details.rawTextSnippet = err.rawTextSnippet || '';
  }
  if (err?.status) details.status = err.status;
  console.warn('Coach generation failed:', details);
}

function createRecommendationFromPrescription(state, request, program, place, prescription, source = 'ai') {
  const placeEquipmentSnapshot = getEffectivePlaceEquipment(place).map(item => item.label);
  const countsTowardTraining = prescription.variant === 'workout';
  const roadmapSnapshot = getRoadmapSnapshotForProgram(state, program?.id);
  return {
    id: `recommendation_${Date.now()}`,
    generatedAt: new Date().toISOString(),
    variant: prescription.variant,
    source,
    programId: program?.id || null,
    programName: program?.name || (prescription.variant === 'desk_reset' ? 'Desk Reset' : 'Coach Session'),
    placeId: place?.id || null,
    placeName: place?.name || 'Unknown place',
    summary: prescription.summary,
    rationale: prescription.rationale,
    changeSummary: prescription.changeSummary,
    recoveryIntent: prescription.recoveryIntent,
    tags: prescription.tags,
    targetMuscles: prescription.targetMuscles,
    contraindications: prescription.contraindications,
    items: prescription.items,
    placeEquipmentSnapshot,
    countsTowardTraining,
    availableMinutes: clamp(toNum(state?.coachContext?.inputs?.availableMinutes, 45), 5, 240),
    modelUsed: prescription.modelUsed || state?.aiConfig?.lastSuccessfulModel || state?.aiConfig?.model || null,
    usedFallback: !!prescription.usedFallback,
    roadmapPhase: roadmapSnapshot?.currentPhase?.label || '',
    roadmapPhaseFocus: roadmapSnapshot?.currentPhase?.focus || '',
    roadmapNextMilestone: roadmapSnapshot?.nextMilestone || '',
    roadmapEtaLowDate: roadmapSnapshot?.etaLowDate || null,
    roadmapEtaHighDate: roadmapSnapshot?.etaHighDate || null,
    roadmapDriftStatus: roadmapSnapshot?.driftStatus || state?.coachRoadmap?.driftStatus || 'stable',
    onPlanStatus: roadmapSnapshot?.driftStatus === 'stable' ? 'on_plan' : (roadmapSnapshot?.driftStatus === 'watch' ? 'adjusted' : 'compensatory'),
  };
}

function createActiveSessionFromRecommendation(recommendation, state) {
  if (!recommendation) return null;
  return {
    ...recommendation,
    id: `active_${Date.now()}`,
    itemResults: (recommendation.items || []).map(item => ({
      itemId: item.id,
      completed: false,
      effort: clamp(toNum(item.targetEffort, 5), 1, 10),
      notes: '',
    })),
    readinessSnapshot: {
      ...state.coachContext.readiness,
      inputs: { ...state.coachContext.inputs },
      at: new Date().toISOString(),
    },
    notes: '',
  };
}

function computeCoachCompletionQuality(itemResults = [], recovery = 6, energyLevel = 7) {
  const completedRatio = itemResults.length
    ? itemResults.filter(result => result.completed).length / itemResults.length
    : 0;
  const recoveryScore = clamp(toNum(recovery, 6) / 10, 0, 1);
  const energyScore = clamp(toNum(energyLevel, 7) / 10, 0, 1);
  return Math.round(clamp((completedRatio * 70) + (recoveryScore * 15) + (energyScore * 15), 0, 100));
}

function resolvePlaceForRequest(state, request) {
  const places = getPlaceItems(state);
  if (!places.length) return { mode: 'none', reasonText: 'Create at least one place before generating a session.' };
  if (request.placeId) {
    const direct = getPlaceById(state, request.placeId);
    return direct ? { mode: 'direct', place: direct } : { mode: 'none', reasonText: 'Selected place could not be found.' };
  }

  const program = request.programId ? getProgramById(state, request.programId) : null;
  const preferredPlaces = program
    ? (program.preferredPlaceIds || []).map(placeId => getPlaceById(state, placeId)).filter(Boolean)
    : [];
  const availablePreferred = preferredPlaces.filter(place => isPlaceAvailableNow(place));
  const availablePlaces = places.filter(place => isPlaceAvailableNow(place));

  if (program) {
    if (availablePreferred.length === 1) {
      return { mode: 'direct', place: availablePreferred[0] };
    }
    if (availablePreferred.length > 1) {
      return {
        mode: 'ask',
        reasonText: 'Multiple preferred places are available right now. Choose which one you are using.',
        placeIds: availablePreferred.map(place => place.id),
      };
    }
    return {
      mode: 'ask',
      reasonText: 'Your preferred places are unavailable right now. Tell the coach which place you want to use and it will re-plan accordingly.',
      placeIds: (preferredPlaces.length ? preferredPlaces : places).map(place => place.id),
    };
  }

  if (availablePlaces.length === 1) {
    return { mode: 'direct', place: availablePlaces[0] };
  }
  return {
    mode: 'ask',
    reasonText: availablePlaces.length > 1
      ? 'Multiple places are available right now. Choose where you are training.'
      : 'No place is currently marked available. Choose where you are training and the coach will adapt.',
    placeIds: (availablePlaces.length ? availablePlaces : places).map(place => place.id),
  };
}

async function runCoachGeneration(state, dispatch, request) {
  const requestSource = request?.requestSource || 'today';
  dispatch({ type: 'COACH_REQUEST_START', payload: { requestSource } });
  const resolution = resolvePlaceForRequest(state, request);
  if (resolution.mode === 'none') {
    dispatch({ type: 'COACH_REQUEST_ERROR', payload: resolution.reasonText });
    return;
  }
  if (resolution.mode === 'ask') {
    dispatch({
      type: 'COACH_REQUEST_NEEDS_PLACE',
      payload: {
        request,
        reasonText: resolution.reasonText,
        placeIds: resolution.placeIds,
        requestSource,
      },
    });
    return;
  }

  const place = resolution.place;
  const program = request.programId ? getProgramById(state, request.programId) : null;

  if (request.placeId && state.coachPlan?.pendingPlaceResolution) {
    dispatch({
      type: 'RESOLVE_SESSION_PLACE',
      payload: {
        placeId: request.placeId,
        request,
      },
    });
  }

  if (!state.aiConfig.enabled || !state.aiConfig.apiKey) {
    const fallback = buildSafeResetFallback(state, request, place, 'Enable the AI coach and add your Gemini API key to unlock full coaching.');
    dispatch({
      type: 'COACH_REQUEST_FALLBACK',
      payload: {
        recommendation: createRecommendationFromPrescription(state, request, program, place, fallback, 'safe_fallback'),
        error: 'AI coach is disabled or missing an API key. Loaded a safe reset instead.',
        requestSource,
        modelAttempts: [],
      },
    });
    return;
  }

  try {
    const prescription = await callCoachPrescriptionAI(state, request, program, place);
    const recommendation = createRecommendationFromPrescription(state, request, program, place, prescription, 'ai');
    dispatch({
      type: 'COACH_REQUEST_SUCCESS',
      payload: {
        recommendation,
        requestSource,
        modelAttempts: prescription.modelAttempts || [],
      },
    });
  } catch (err) {
    const failure = normalizeCoachGenerationFailure(err);
    logCoachGenerationFailure(request, err, failure);
    const fallback = request.variant === 'workout' && program
      ? buildConstrainedRoadmapFallback(state, request, program, place)
      : buildSafeResetFallback(state, request, place, failure.reason);
    dispatch({
      type: 'COACH_REQUEST_FALLBACK',
      payload: {
        recommendation: createRecommendationFromPrescription(
          state,
          request,
          program,
          place,
          {
            ...fallback,
            modelUsed: err?.lastModelTried || state.aiConfig.model,
            usedFallback: true,
          },
          request.variant === 'workout' && program ? 'roadmap_fallback' : 'safe_fallback'
        ),
        error: failure.message,
        requestSource,
        modelAttempts: err?.modelAttempts || [],
      },
    });
  }
}

async function runCoachRoadmapRefresh(state, dispatch, options = {}) {
  const reason = options.reason || 'manual_refresh';
  const sourceSignature = options.sourceSignature || null;
  const aiRefreshSignature = options.aiRefreshSignature || sourceSignature || null;
  const localRoadmap = options.localRoadmap || buildLocalCoachRoadmap(state, reason);
  dispatch({
    type: 'COACH_ROADMAP_START',
    payload: {
      roadmap: {
        ...localRoadmap,
        sourceSignature,
      },
      reason,
    },
  });
  if (!state.aiConfig.enabled || !state.aiConfig.apiKey || getActivePrograms(state).length === 0) {
    dispatch({
      type: 'COACH_ROADMAP_LOCAL_ONLY',
      payload: {
        roadmap: {
          ...localRoadmap,
          sourceSignature,
          aiRefreshSignature,
        },
      },
    });
    return;
  }
  try {
    const aiRoadmap = await callCoachRoadmapAI(state, localRoadmap, reason);
    const { programPatches, auditEntries } = normalizeCoachPlanChanges(state, aiRoadmap.roadmapChanges || []);
    dispatch({
      type: 'COACH_ROADMAP_SUCCESS',
      payload: {
        roadmap: {
          ...aiRoadmap,
          sourceSignature,
          aiRefreshSignature,
          updatedAt: new Date().toISOString(),
        },
        programPatches,
        auditEntries,
        modelAttempts: aiRoadmap.modelAttempts || [],
      },
    });
  } catch (err) {
    const classified = classifyCoachAIError(err);
    dispatch({
      type: 'COACH_ROADMAP_ERROR',
      payload: {
        roadmap: {
          ...localRoadmap,
          sourceSignature,
          aiRefreshSignature,
        },
        error: classified.reason || 'Roadmap refresh failed.',
        modelAttempts: err?.modelAttempts || [],
      },
    });
  }
}

function appendAuditEntries(existing = [], additions = []) {
  return [...(additions || []), ...(existing || [])].slice(0, 160);
}

function applyProgramPatches(items = [], patches = []) {
  if (!patches.length) return items;
  const mergedPatches = patches.reduce((acc, entry) => {
    if (!entry?.id) return acc;
    acc[entry.id] = { ...(acc[entry.id] || {}), ...(entry.patch || {}) };
    return acc;
  }, {});
  return items.map(item => {
    return mergedPatches[item.id] ? { ...item, ...mergedPatches[item.id] } : item;
  });
}

function coachReducer(state, action) {
  switch (action.type) {
    case 'SET_VIEW':
      return { ...state, view: action.payload };
    case 'SET_SETUP_STEP':
      return { ...state, setupStep: clamp(toNum(action.payload, 0), 0, 3) };
    case 'COMPLETE_SETUP':
      return { ...state, setupComplete: true, view: 'today' };
    case 'UPDATE_PROFILE_FIELD': {
      const { field, value } = action.payload || {};
      if (!field) return state;
      return {
        ...state,
        profile: {
          ...state.profile,
          [field]: value,
        },
      };
    }
    case 'TOGGLE_PROFILE_INJURY': {
      const key = action.payload?.key;
      if (!key) return state;
      return {
        ...state,
        profile: {
          ...state.profile,
          injuries: {
            ...state.profile.injuries,
            [key]: !state.profile.injuries[key],
          },
        },
      };
    }
    case 'UPDATE_COACH_INPUT': {
      const { field, value } = action.payload || {};
      if (!field) return state;
      const inputs = {
        ...state.coachContext.inputs,
        [field]: field === 'availableMinutes'
          ? clamp(toNum(value, state.coachContext.inputs.availableMinutes), 5, 240)
          : value,
      };
      return {
        ...state,
        coachContext: {
          inputs,
          readiness: calculateReadiness(inputs),
          lastUpdatedAt: new Date().toISOString(),
        },
      };
    }
    case 'APPEND_COACH_CHAT_MESSAGE': {
      const message = normalizeCoachChatMessage(action.payload);
      if (!message) return state;
      return {
        ...state,
        coachChat: {
          ...state.coachChat,
          messages: appendCoachChatMessages(state.coachChat?.messages, [message]),
        },
      };
    }
    case 'SET_COACH_CHAT_LOADING':
      return {
        ...state,
        coachChat: {
          ...state.coachChat,
          loading: !!action.payload,
        },
      };
    case 'SET_COACH_CHAT_ERROR':
      return {
        ...state,
        coachChat: {
          ...state.coachChat,
          error: action.payload || null,
        },
      };
    case 'REGISTER_AI_MODEL_ATTEMPTS':
      return {
        ...state,
        aiConfig: applyModelAttemptHistory(state.aiConfig, action.payload?.attempts || []),
      };
    case 'SET_COACH_CHAT_PROPOSAL':
      return {
        ...state,
        coachChat: {
          ...state.coachChat,
          pendingProposal: action.payload || null,
        },
      };
    case 'CLEAR_COACH_CHAT_PROPOSAL':
      return {
        ...state,
        coachChat: {
          ...state.coachChat,
          pendingProposal: null,
        },
      };
    case 'CLEAR_COACH_CHAT_HISTORY':
      return {
        ...state,
        coachChat: {
          ...state.coachChat,
          messages: [],
          error: null,
          lastGeneratedRecommendationId: null,
        },
      };
    case 'APPLY_COACH_CHAT_PROPOSAL': {
      const proposal = state.coachChat?.pendingProposal;
      if (!proposal?.changes?.length) return state;
      const applied = applyCoachChangesToState(state, proposal.changes);
      return {
        ...state,
        programs: applied.programs,
        places: applied.places,
        coachAuditLog: applied.coachAuditLog,
        coachChat: {
          ...state.coachChat,
          pendingProposal: null,
        },
      };
    }
    case 'ADD_PROGRAM': {
      const nextProgram = createCoachProgram(action.payload || {});
      return {
        ...state,
        programs: {
          items: [...getProgramItems(state), nextProgram],
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'UPDATE_PROGRAM': {
      const { id, patch } = action.payload || {};
      if (!id) return state;
      return {
        ...state,
        programs: {
          items: getProgramItems(state).map(item => item.id === id ? { ...item, ...(patch || {}) } : item),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'DELETE_PROGRAM': {
      const id = action.payload?.id;
      if (!id) return state;
      return {
        ...state,
        programs: {
          items: getProgramItems(state).filter(item => item.id !== id),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'TOGGLE_PROGRAM': {
      const id = action.payload?.id;
      if (!id) return state;
      return {
        ...state,
        programs: {
          items: getProgramItems(state).map(item => item.id === id ? { ...item, active: !item.active } : item),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'ATTACH_PROGRAM_PLACE': {
      const { id, placeId } = action.payload || {};
      if (!id || !placeId) return state;
      return {
        ...state,
        programs: {
          items: getProgramItems(state).map(item => {
            if (item.id !== id) return item;
            if ((item.preferredPlaceIds || []).includes(placeId)) return item;
            return { ...item, preferredPlaceIds: [...(item.preferredPlaceIds || []), placeId] };
          }),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'DETACH_PROGRAM_PLACE': {
      const { id, placeId } = action.payload || {};
      if (!id || !placeId) return state;
      return {
        ...state,
        programs: {
          items: getProgramItems(state).map(item => {
            if (item.id !== id) return item;
            return { ...item, preferredPlaceIds: (item.preferredPlaceIds || []).filter(currentId => currentId !== placeId) };
          }),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'MOVE_PROGRAM_PLACE': {
      const { id, from, to } = action.payload || {};
      if (!id || from === undefined || to === undefined) return state;
      return {
        ...state,
        programs: {
          items: getProgramItems(state).map(item => {
            if (item.id !== id) return item;
            return { ...item, preferredPlaceIds: moveItem(item.preferredPlaceIds || [], from, to) };
          }),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'ADD_PLACE': {
      const nextPlace = createCoachPlace(action.payload || {});
      return {
        ...state,
        places: {
          items: [...getPlaceItems(state), nextPlace],
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'UPDATE_PLACE': {
      const { id, patch } = action.payload || {};
      if (!id) return state;
      return {
        ...state,
        places: {
          items: getPlaceItems(state).map(item => item.id === id ? { ...item, ...(patch || {}) } : item),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'DELETE_PLACE': {
      const id = action.payload?.id;
      if (!id) return state;
      return {
        ...state,
        places: {
          items: getPlaceItems(state).filter(item => item.id !== id),
          updatedAt: new Date().toISOString(),
        },
        programs: {
          items: getProgramItems(state).map(program => ({
            ...program,
            preferredPlaceIds: (program.preferredPlaceIds || []).filter(placeId => placeId !== id),
          })),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'SET_PLACE_OVERRIDE': {
      const { placeId, value } = action.payload || {};
      if (!placeId || !COACH_PLACE_OVERRIDE_OPTIONS.includes(value)) return state;
      return {
        ...state,
        places: {
          items: getPlaceItems(state).map(place => place.id === placeId ? { ...place, availabilityOverride: value } : place),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'UPSERT_PLACE_EQUIPMENT': {
      const { placeId, raw } = action.payload || {};
      if (!placeId) return state;
      return {
        ...state,
        places: {
          items: getPlaceItems(state).map(place => place.id === placeId ? {
            ...place,
            equipmentRaw: raw,
            equipmentNormalized: normalizeEquipmentText(raw),
          } : place),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'SET_EQUIPMENT_OVERRIDE': {
      const { placeId, raw } = action.payload || {};
      if (!placeId) return state;
      return {
        ...state,
        places: {
          items: getPlaceItems(state).map(place => place.id === placeId ? {
            ...place,
            unavailableEquipmentRaw: raw,
            unavailableEquipmentNormalized: normalizeEquipmentText(raw),
          } : place),
          updatedAt: new Date().toISOString(),
        },
      };
    }
    case 'COACH_REQUEST_START':
      return {
        ...state,
        coachPlan: {
          ...state.coachPlan,
          loading: true,
          error: null,
        },
      };
    case 'SYNC_LOCAL_ROADMAP': {
      const roadmap = action.payload?.roadmap;
      if (!roadmap) return state;
      if (roadmap.sourceSignature && roadmap.sourceSignature === state.coachRoadmap?.sourceSignature && (state.coachRoadmap?.programForecasts || []).length) {
        return state;
      }
      return {
        ...state,
        coachRoadmap: {
          ...state.coachRoadmap,
          ...roadmap,
          loading: state.coachRoadmap?.loading || false,
          error: state.coachRoadmap?.error || null,
          updatedAt: roadmap.updatedAt || new Date().toISOString(),
        },
      };
    }
    case 'COACH_ROADMAP_START':
      return {
        ...state,
        coachRoadmap: {
          ...state.coachRoadmap,
          ...(action.payload?.roadmap || {}),
          loading: true,
          error: null,
          lastReforecastReason: action.payload?.reason || state.coachRoadmap?.lastReforecastReason || 'refresh',
        },
      };
    case 'COACH_ROADMAP_LOCAL_ONLY':
      return {
        ...state,
        coachRoadmap: {
          ...state.coachRoadmap,
          ...(action.payload?.roadmap || {}),
          loading: false,
          error: null,
          updatedAt: action.payload?.roadmap?.updatedAt || new Date().toISOString(),
        },
      };
    case 'COACH_ROADMAP_SUCCESS':
      return {
        ...state,
        programs: {
          items: applyProgramPatches(getProgramItems(state), action.payload?.programPatches || []),
          updatedAt: (action.payload?.programPatches || []).length ? new Date().toISOString() : state.programs.updatedAt,
        },
        coachRoadmap: {
          ...state.coachRoadmap,
          ...(action.payload?.roadmap || {}),
          loading: false,
          error: null,
          updatedAt: action.payload?.roadmap?.updatedAt || new Date().toISOString(),
        },
        coachAuditLog: appendAuditEntries(state.coachAuditLog, action.payload?.auditEntries || []),
        aiConfig: applyModelAttemptHistory(state.aiConfig, action.payload?.modelAttempts || []),
      };
    case 'COACH_ROADMAP_ERROR':
      return {
        ...state,
        coachRoadmap: {
          ...state.coachRoadmap,
          ...(action.payload?.roadmap || {}),
          loading: false,
          error: action.payload?.error || 'Roadmap refresh failed.',
          updatedAt: action.payload?.roadmap?.updatedAt || new Date().toISOString(),
        },
        aiConfig: applyModelAttemptHistory(state.aiConfig, action.payload?.modelAttempts || []),
      };
    case 'COACH_REQUEST_NEEDS_PLACE':
      return {
        ...state,
        coachPlan: {
          ...state.coachPlan,
          loading: false,
          error: null,
          pendingPlaceResolution: action.payload,
        },
      };
    case 'RESOLVE_SESSION_PLACE': {
      const place = getPlaceById(state, action.payload?.placeId);
      const program = getProgramById(state, action.payload?.request?.programId);
      const auditEntry = place
        ? createAuditEntry({
          type: 'place_resolution',
          title: `Place selected: ${place.name}`,
          detail: program
            ? `The coach will generate ${program.name} against ${place.name}.`
            : `The coach will generate the session against ${place.name}.`,
          source: 'user',
          reasonCode: 'manual_place_resolution',
        })
        : null;
      return {
        ...state,
        coachPlan: {
          ...state.coachPlan,
          pendingPlaceResolution: null,
        },
        coachAuditLog: auditEntry ? appendAuditEntries(state.coachAuditLog, [auditEntry]) : state.coachAuditLog,
      };
    }
    case 'COACH_REQUEST_SUCCESS':
      return {
        ...state,
        coachPlan: {
          loading: false,
          error: null,
          recommendation: action.payload?.recommendation || null,
          pendingPlaceResolution: null,
          lastGeneratedAt: new Date().toISOString(),
        },
        coachChat: {
          ...state.coachChat,
          lastGeneratedRecommendationId: action.payload?.requestSource === 'chat'
            ? (action.payload?.recommendation?.id || null)
            : state.coachChat?.lastGeneratedRecommendationId || null,
        },
        aiConfig: applyModelAttemptHistory(state.aiConfig, action.payload?.modelAttempts || []),
      };
    case 'COACH_REQUEST_FALLBACK':
      return {
        ...state,
        coachPlan: {
          loading: false,
          error: action.payload?.error || 'AI coach failed.',
          recommendation: action.payload?.recommendation || null,
          pendingPlaceResolution: null,
          lastGeneratedAt: new Date().toISOString(),
        },
        coachChat: {
          ...state.coachChat,
          lastGeneratedRecommendationId: action.payload?.requestSource === 'chat'
            ? (action.payload?.recommendation?.id || null)
            : state.coachChat?.lastGeneratedRecommendationId || null,
        },
        aiConfig: applyModelAttemptHistory(state.aiConfig, action.payload?.modelAttempts || []),
        coachAuditLog: appendAuditEntries(state.coachAuditLog, [
          createAuditEntry({
            type: 'safe_fallback',
            title: action.payload?.recommendation?.source === 'roadmap_fallback' ? 'Roadmap fallback loaded' : 'Safe reset fallback loaded',
            detail: action.payload?.error || 'AI coach failed, so the app loaded a fallback recommendation instead.',
            source: 'system',
            reasonCode: action.payload?.recommendation?.source === 'roadmap_fallback' ? 'roadmap_fallback' : 'coach_fallback',
          }),
        ]),
      };
    case 'COACH_REQUEST_ERROR':
      return {
        ...state,
        coachPlan: {
          ...state.coachPlan,
          loading: false,
          error: action.payload || 'Coach request failed.',
        },
      };
    case 'START_RECOMMENDED_SESSION': {
      const recommendation = state.coachPlan?.recommendation;
      if (!recommendation) return state;
      return {
        ...state,
        activeSession: createActiveSessionFromRecommendation(recommendation, state),
        coachPlan: {
          ...state.coachPlan,
          recommendation: null,
        },
        postSessionSummary: null,
        view: 'train',
      };
    }
    case 'UPDATE_ACTIVE_SESSION_ITEM': {
      if (!state.activeSession) return state;
      const { itemId, patch } = action.payload || {};
      if (!itemId) return state;
      return {
        ...state,
        activeSession: {
          ...state.activeSession,
          itemResults: (state.activeSession.itemResults || []).map(result => result.itemId === itemId ? { ...result, ...(patch || {}) } : result),
        },
      };
    }
    case 'CANCEL_ACTIVE_SESSION':
      return {
        ...state,
        activeSession: null,
        view: 'today',
      };
    case 'COMPLETE_AI_SESSION': {
      if (!state.activeSession) return state;
      const session = state.activeSession;
      const payload = action.payload || {};
      const completedAt = new Date().toISOString();
      const completionQuality = computeCoachCompletionQuality(session.itemResults || [], payload.recovery, payload.energyLevel);
      const log = {
        ...session,
        completedAt,
        rpe: clamp(toNum(payload.rpe, 6), 1, 10),
        recovery: clamp(toNum(payload.recovery, 6), 1, 10),
        energyLevel: clamp(toNum(payload.energyLevel, 7), 1, 10),
        notes: String(payload.notes || '').trim(),
        completionQuality,
      };
      const itemsForRecovery = (session.items || []).map(item => ({
        muscles: [...(item.musclesPrimary || []), ...(item.musclesSecondary || [])],
      }));
      const nextMuscleRecovery = session.countsTowardTraining
        ? updateMuscleRecovery(state.muscleRecovery, itemsForRecovery)
        : state.muscleRecovery;
      return {
        ...state,
        sessionLogs: [...state.sessionLogs, log],
        profile: {
          ...state.profile,
          sessionCount: state.profile.sessionCount + (session.countsTowardTraining ? 1 : 0),
        },
        muscleRecovery: nextMuscleRecovery,
        activeSession: null,
        postSessionSummary: {
          id: log.id,
          variant: log.variant,
          title: log.summary || (log.variant === 'desk_reset' ? 'Desk Reset complete' : 'Workout complete'),
          programName: log.programName,
          placeName: log.placeName,
          completionQuality,
          rpe: log.rpe,
          recovery: log.recovery,
          energyLevel: log.energyLevel,
          completedAt,
          countsTowardTraining: log.countsTowardTraining,
        },
        view: session.countsTowardTraining ? 'train' : 'today',
      };
    }
    case 'DISMISS_POST_SESSION_SUMMARY':
      return {
        ...state,
        postSessionSummary: null,
        view: action.payload?.view || 'today',
      };
    case 'UPDATE_AI_CONFIG': {
      const patch = action.payload || {};
      const model = patch.model !== undefined
        ? normalizeGeminiModel(patch.model)
        : normalizeGeminiModel(state.aiConfig.model);
      const fallbackPolicy = patch.fallbackPolicy === 'best_other_available'
        ? 'best_other_available'
        : state.aiConfig.fallbackPolicy;
      const modelRankings = normalizeModelRankings(
        patch.modelRankings !== undefined ? patch.modelRankings : state.aiConfig.modelRankings
      );
      const modelHealth = normalizeModelHealthMap(
        patch.modelHealth !== undefined ? patch.modelHealth : state.aiConfig.modelHealth
      );
      const lastSuccessfulModel = patch.lastSuccessfulModel === null
        ? null
        : patch.lastSuccessfulModel
          ? normalizeGeminiModel(patch.lastSuccessfulModel)
          : state.aiConfig.lastSuccessfulModel;
      return {
        ...state,
        aiConfig: {
          ...state.aiConfig,
          ...(patch || {}),
          model,
          planningModel: model,
          endpoint: buildGeminiEndpoint(model),
          fallbackPolicy,
          modelRankings,
          modelHealth,
          lastSuccessfulModel,
        },
      };
    }
    case 'RESET_COACH_STATE': {
      const legacyBackupMeta = state.legacyBackupMeta || readLegacyBackupMeta();
      const aiConfig = state.aiConfig || createAIConfig();
      const programConfig = state.programConfig || createProgramConfig();
      return createCoachState({
        aiConfig,
        programConfig,
        legacyBackupMeta,
      });
    }
    default:
      return state;
  }
}

function downloadJsonFile(filename, payload) {
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
}

function CoachProgramPreferenceEditor({ program, state, dispatch }) {
  const placeMap = getPlaceMap(state);
  const unselectedPlaces = getPlaceItems(state).filter(place => !(program.preferredPlaceIds || []).includes(place.id));
  return (
    <div className="space-y-3">
      <div className="space-y-2">
        {(program.preferredPlaceIds || []).length === 0 ? (
          <div className="text-xs text-neutral-500">No preferred places yet.</div>
        ) : (
          (program.preferredPlaceIds || []).map((placeId, index) => {
            const place = placeMap[placeId];
            if (!place) return null;
            return (
              <div key={placeId} className="card-sharp p-3 flex items-center justify-between gap-2">
                <div>
                  <div className="text-sm font-semibold text-neutral-100">{place.name}</div>
                  <div className="text-xs text-neutral-500">{getAvailabilityLabel(place)}</div>
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={() => dispatch({ type: 'MOVE_PROGRAM_PLACE', payload: { id: program.id, from: index, to: Math.max(0, index - 1) } })}
                    className="btn-ghost px-3 py-2 text-[11px] font-semibold uppercase"
                    disabled={index === 0}
                  >
                    Up
                  </button>
                  <button
                    onClick={() => dispatch({ type: 'MOVE_PROGRAM_PLACE', payload: { id: program.id, from: index, to: Math.min((program.preferredPlaceIds || []).length - 1, index + 1) } })}
                    className="btn-ghost px-3 py-2 text-[11px] font-semibold uppercase"
                    disabled={index === (program.preferredPlaceIds || []).length - 1}
                  >
                    Down
                  </button>
                  <button
                    onClick={() => dispatch({ type: 'DETACH_PROGRAM_PLACE', payload: { id: program.id, placeId } })}
                    className="btn-ghost px-3 py-2 text-[11px] font-semibold uppercase"
                  >
                    Remove
                  </button>
                </div>
              </div>
            );
          })
        )}
      </div>
      {unselectedPlaces.length > 0 && (
        <div className="flex flex-wrap gap-2">
          {unselectedPlaces.map(place => (
            <button
              key={place.id}
              onClick={() => dispatch({ type: 'ATTACH_PROGRAM_PLACE', payload: { id: program.id, placeId: place.id } })}
              className="btn-ghost px-3 py-2 text-[11px] font-semibold uppercase"
            >
              Add {place.name}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function CoachChatView({ state, dispatch }) {
  const [input, setInput] = useState('');
  const bottomRef = useRef(null);
  const messages = state.coachChat?.messages || [];
  const loading = !!state.coachChat?.loading;
  const latestRecommendation = state.coachPlan?.recommendation?.id
    && state.coachPlan.recommendation.id === state.coachChat?.lastGeneratedRecommendationId
    ? state.coachPlan.recommendation
    : null;
  const examplePrompts = [
    'Design today’s strength workout at the gym',
    'I’m stiff in hips and lower back, give me a desk reset',
    'When can I reach my next level in strength?',
    'What happens if I miss this week?',
  ];

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages.length, loading, state.coachChat?.pendingProposal?.id, latestRecommendation?.id, state.coachPlan?.pendingPlaceResolution?.placeIds?.join(',')]);

  const sendPrompt = async (seedText = null) => {
    const text = String(seedText !== null ? seedText : input).trim();
    if (!text || loading) return;
    if (seedText === null) setInput('');

    dispatch({ type: 'APPEND_COACH_CHAT_MESSAGE', payload: { role: 'user', text } });
    dispatch({ type: 'SET_COACH_CHAT_ERROR', payload: null });

    if (!state.aiConfig.enabled || !state.aiConfig.apiKey) {
      dispatch({
        type: 'APPEND_COACH_CHAT_MESSAGE',
        payload: {
          role: 'coach',
          text: 'Enable AI coach and add your Gemini API key in Settings to use coach chat.',
        },
      });
      return;
    }

    dispatch({ type: 'SET_COACH_CHAT_LOADING', payload: true });
    try {
      const response = await callCoachChatAI(state, text);
      if (response.modelAttempts?.length) {
        dispatch({ type: 'REGISTER_AI_MODEL_ATTEMPTS', payload: { attempts: response.modelAttempts } });
      }
      const normalized = normalizeCoachChatActions(state, response.actions || []);
      const replyText = response.reply
        || (normalized.proposal
          ? 'Prepared coach changes below.'
          : (normalized.sessionRequest ? 'Queued a coached generation request.' : 'Done.'));

      dispatch({
        type: 'APPEND_COACH_CHAT_MESSAGE',
        payload: {
          role: 'coach',
          text: replyText,
          actionSummary: normalized.actionSummary,
        },
      });

      if (normalized.proposal) {
        dispatch({ type: 'SET_COACH_CHAT_PROPOSAL', payload: normalized.proposal });
      }

      if (normalized.sessionRequest) {
        await runCoachGeneration(state, dispatch, normalized.sessionRequest);
      }
    } catch (err) {
      const message = err?.message || 'Coach chat failed.';
      if (err?.modelAttempts?.length) {
        dispatch({ type: 'REGISTER_AI_MODEL_ATTEMPTS', payload: { attempts: err.modelAttempts } });
      }
      dispatch({ type: 'SET_COACH_CHAT_ERROR', payload: message });
      dispatch({
        type: 'APPEND_COACH_CHAT_MESSAGE',
        payload: {
          role: 'coach',
          text: `Error: ${message}`,
        },
      });
    } finally {
      dispatch({ type: 'SET_COACH_CHAT_LOADING', payload: false });
    }
  };

  return (
    <div className="space-y-4">
      <ViewHeader
        eyebrow="Chat"
        title="Coach chat"
        subtitle="Use natural language to coach, generate sessions, and draft program or place changes."
      />

      <SurfaceCard className="overflow-hidden" padding="p-0">
        <div className="flex items-center justify-between px-4 pt-4 pb-2">
          <div className="text-[11px] font-semibold uppercase tracking-[0.18em] accent">Conversation</div>
          {messages.length > 0 && (
            <button onClick={() => dispatch({ type: 'CLEAR_COACH_CHAT_HISTORY' })} className="text-xs font-semibold uppercase text-neutral-500 hover:text-neutral-300">
              Clear
            </button>
          )}
        </div>
        <div className="px-4 pb-3 space-y-3 overflow-y-auto" style={{ maxHeight: 360, minHeight: 180 }}>
          {messages.length === 0 && (
            <div className="space-y-3 py-2">
              <div className="text-sm text-neutral-400">
                Ask for coaching, a workout, a desk reset, or changes to programs and places.
              </div>
              <div className="flex flex-wrap gap-2">
                {examplePrompts.map(prompt => (
                  <button
                    key={prompt}
                    onClick={() => sendPrompt(prompt)}
                    disabled={loading}
                    className="chip text-neutral-300 disabled:opacity-40"
                  >
                    {prompt}
                  </button>
                ))}
              </div>
            </div>
          )}
          {messages.map(message => (
            <div key={message.id} className={`flex ${message.role === 'user' ? 'justify-end' : 'justify-start'}`}>
              <div className={`max-w-[88%] px-3 py-2 rounded-xl text-sm whitespace-pre-wrap leading-relaxed ${message.role === 'user' ? 'text-white' : 'card-sharp text-neutral-200'}`} style={message.role === 'user' ? { background: 'var(--accent)' } : {}}>
                <div>{message.text}</div>
                {message.actionSummary && (
                  <div className={`mt-2 text-[11px] uppercase tracking-[0.12em] ${message.role === 'user' ? 'text-red-100/90' : 'text-neutral-500'}`}>
                    {message.actionSummary}
                  </div>
                )}
              </div>
            </div>
          ))}
          {loading && (
            <div className="flex justify-start">
              <div className="card-sharp px-3 py-2 text-sm text-neutral-500 pulse">Coach is thinking...</div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
        <div className="border-t border-neutral-800 p-4 space-y-3">
          <CoachTextarea
            rows={2}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendPrompt();
              }
            }}
            placeholder="Ask your coach anything..."
          />
          <div className="flex items-center justify-between gap-3">
            <div className="text-xs text-neutral-500">Enter sends. Shift+Enter adds a new line.</div>
            <button
              onClick={() => sendPrompt()}
              disabled={loading || !input.trim()}
              className="btn-accent px-5 py-3 text-xs font-semibold uppercase tracking-[0.16em] disabled:opacity-40"
            >
              Send
            </button>
          </div>
          {state.coachChat?.error && <div className="text-sm text-red-400">{state.coachChat.error}</div>}
        </div>
      </SurfaceCard>

      <CoachChatProposalCard proposal={state.coachChat?.pendingProposal} state={state} dispatch={dispatch} />
      <CoachPendingPlaceCard state={state} dispatch={dispatch} />
      <CoachRoadmapSnapshotCard state={state} dispatch={dispatch} showRefresh={false} />
      {state.coachPlan?.error && <div className="text-sm text-red-400">{state.coachPlan.error}</div>}
      <CoachRecommendationCard recommendation={latestRecommendation} dispatch={dispatch} />
    </div>
  );
}

function CoachTrainView({ state, dispatch }) {
  const activeSession = state.activeSession;
  const [rpe, setRpe] = useState(6);
  const [recovery, setRecovery] = useState(6);
  const [energyLevel, setEnergyLevel] = useState(7);
  const [notes, setNotes] = useState('');

  useEffect(() => {
    setRpe(6);
    setRecovery(6);
    setEnergyLevel(7);
    setNotes('');
  }, [activeSession?.id, state.postSessionSummary?.id]);

  if (!activeSession) {
    if (state.postSessionSummary) {
      const summary = state.postSessionSummary;
      return (
        <SurfaceCard className="space-y-4" padding="p-5">
          <div className="text-[11px] font-semibold uppercase tracking-[0.18em] accent">Session Logged</div>
          <div className="text-lg font-semibold text-neutral-100">{summary.title}</div>
          <div className="grid gap-2 sm:grid-cols-3">
            <StatPill label="Quality" value={`${summary.completionQuality}%`} tone="accent" />
            <StatPill label="Recovery" value={summary.recovery} />
            <StatPill label="Energy" value={summary.energyLevel} />
          </div>
          <div className="text-sm text-neutral-400">
            {summary.programName || 'Recovery'} · {summary.placeName || 'Unknown place'}
          </div>
          <button
            onClick={() => dispatch({ type: 'DISMISS_POST_SESSION_SUMMARY', payload: { view: 'today' } })}
            className="btn-accent w-full py-4 text-sm font-semibold uppercase tracking-[0.16em]"
          >
            Back to Today
          </button>
        </SurfaceCard>
      );
    }

    return (
      <EmptyState
        title="No Active Session"
        body="Generate a coached workout or desk reset from Today."
        actionLabel="Open Today"
        onAction={() => dispatch({ type: 'SET_VIEW', payload: 'today' })}
      />
    );
  }

  const completedCount = (activeSession.itemResults || []).filter(item => item.completed).length;
  const completionPct = activeSession.itemResults?.length
    ? Math.round((completedCount / activeSession.itemResults.length) * 100)
    : 0;

  return (
    <div className="space-y-4">
      <ViewHeader
        eyebrow={activeSession.countsTowardTraining ? 'Workout' : 'Reset'}
        title={activeSession.summary}
        subtitle={`${activeSession.programName || 'Coach'} · ${activeSession.placeName}`}
        actions={
          <button onClick={() => dispatch({ type: 'CANCEL_ACTIVE_SESSION' })} className="btn-ghost px-3 py-2 text-xs font-semibold uppercase">
            Cancel
          </button>
        }
      />

      <SurfaceCard tone={activeSession.source === 'safe_fallback' ? 'soft' : 'accent'} className="space-y-4" padding="p-5">
        <div className="space-y-2">
          <div className="flex items-center justify-between gap-3">
            <InlineBadge tone={activeSession.countsTowardTraining ? 'accent' : 'warn'}>
              {activeSession.variant === 'desk_reset' ? 'Desk Reset' : 'Coach Session'}
            </InlineBadge>
            <div className="text-xs text-neutral-500">{activeSession.placeName}</div>
          </div>
          <div className="text-sm text-neutral-300">{activeSession.rationale}</div>
        </div>
        {(activeSession.roadmapPhase || activeSession.roadmapNextMilestone) && (
          <div className="card-sharp p-3 space-y-1">
            <div className="text-xs font-semibold uppercase tracking-[0.14em] text-neutral-500">Roadmap Context</div>
            <div className="text-sm text-neutral-100">{activeSession.roadmapPhase || 'Current phase'}</div>
            <div className="text-sm text-neutral-400">{activeSession.roadmapPhaseFocus || activeSession.roadmapNextMilestone}</div>
            {activeSession.roadmapEtaLowDate && activeSession.roadmapEtaHighDate && (
              <div className="text-xs text-neutral-500">
                ETA {formatCoachDateRange(activeSession.roadmapEtaLowDate, activeSession.roadmapEtaHighDate)} · {activeSession.onPlanStatus || 'on_plan'}
              </div>
            )}
          </div>
        )}
        <div className="progress-bar">
          <div className="progress-fill" style={{ width: `${completionPct}%` }} />
        </div>
        <div className="text-xs text-neutral-500">
          {completedCount}/{activeSession.itemResults.length} items marked complete
        </div>
        <div className="flex flex-wrap gap-2">
          {(activeSession.tags || []).map(tag => <InlineBadge key={tag}>{tag}</InlineBadge>)}
        </div>
        {activeSession.placeEquipmentSnapshot?.length > 0 && (
          <div className="text-xs text-neutral-500">
            Equipment snapshot: {activeSession.placeEquipmentSnapshot.join(', ')}
          </div>
        )}
        {(activeSession.modelUsed || activeSession.usedFallback) && (
          <div className="text-xs text-neutral-500">
            Model: {activeSession.modelUsed || 'unknown'}{activeSession.usedFallback ? ' · fallback chain used' : ''}
          </div>
        )}
      </SurfaceCard>

      {(activeSession.contraindications || []).length > 0 && (
        <SurfaceCard className="space-y-2" padding="p-4">
          <div className="text-[11px] font-semibold uppercase tracking-[0.18em] accent">Contraindications</div>
          <div className="text-sm text-yellow-200">{activeSession.contraindications.join(' · ')}</div>
        </SurfaceCard>
      )}

      {(activeSession.items || []).map(item => {
        const result = (activeSession.itemResults || []).find(entry => entry.itemId === item.id) || { completed: false, effort: item.targetEffort || 5, notes: '' };
        return (
          <SurfaceCard key={item.id} className="space-y-3" padding="p-4">
            <div className="flex items-start justify-between gap-3">
              <div className="space-y-1">
                <div className="text-base font-semibold text-neutral-100">{item.name}</div>
                <div className="text-sm text-neutral-400">{item.instructions}</div>
              </div>
              <button
                onClick={() => dispatch({ type: 'UPDATE_ACTIVE_SESSION_ITEM', payload: { itemId: item.id, patch: { completed: !result.completed } } })}
                className={cx('px-3 py-2 text-xs font-semibold uppercase rounded-lg border', result.completed ? 'accent-dim accent-border' : 'btn-ghost')}
              >
                {result.completed ? 'Done' : 'Mark'}
              </button>
            </div>
            <div className="flex flex-wrap gap-2">
              {item.sets ? <InlineBadge tone="soft">{item.sets} sets</InlineBadge> : null}
              {item.reps ? <InlineBadge tone="soft">{item.reps}</InlineBadge> : null}
              {item.duration ? <InlineBadge tone="soft">{item.duration}</InlineBadge> : null}
              <InlineBadge tone="soft">Effort {item.targetEffort}</InlineBadge>
            </div>
            <div className="text-xs text-neutral-500">
              Targets: {[...(item.musclesPrimary || []), ...(item.musclesSecondary || [])].join(', ') || 'general'}
            </div>
            <div className="grid grid-cols-[92px_1fr] gap-2 items-center">
              <div className="text-xs font-semibold uppercase tracking-[0.14em] text-neutral-500">Effort</div>
              <CoachInput
                type="number"
                min="1"
                max="10"
                value={result.effort}
                onChange={e => dispatch({ type: 'UPDATE_ACTIVE_SESSION_ITEM', payload: { itemId: item.id, patch: { effort: clamp(toNum(e.target.value, result.effort), 1, 10) } } })}
              />
              <div className="text-xs font-semibold uppercase tracking-[0.14em] text-neutral-500">Notes</div>
              <CoachInput
                value={result.notes}
                onChange={e => dispatch({ type: 'UPDATE_ACTIVE_SESSION_ITEM', payload: { itemId: item.id, patch: { notes: e.target.value } } })}
                placeholder="What happened here?"
              />
            </div>
          </SurfaceCard>
        );
      })}

      <SurfaceCard className="space-y-4" padding="p-5">
        <div className="text-[11px] font-semibold uppercase tracking-[0.18em] accent">Session Feedback</div>
        <div className="grid grid-cols-3 gap-3">
          <CoachField label="RPE">
            <CoachInput type="number" min="1" max="10" value={rpe} onChange={e => setRpe(clamp(toNum(e.target.value, rpe), 1, 10))} />
          </CoachField>
          <CoachField label="Recovery">
            <CoachInput type="number" min="1" max="10" value={recovery} onChange={e => setRecovery(clamp(toNum(e.target.value, recovery), 1, 10))} />
          </CoachField>
          <CoachField label="Energy">
            <CoachInput type="number" min="1" max="10" value={energyLevel} onChange={e => setEnergyLevel(clamp(toNum(e.target.value, energyLevel), 1, 10))} />
          </CoachField>
        </div>
        <CoachField label="Notes">
          <CoachTextarea rows={3} value={notes} onChange={e => setNotes(e.target.value)} placeholder="Session summary for the coach" />
        </CoachField>
        <button
          onClick={() => dispatch({ type: 'COMPLETE_AI_SESSION', payload: { rpe, recovery, energyLevel, notes } })}
          className="btn-accent w-full py-4 text-sm font-semibold uppercase tracking-[0.16em]"
        >
          Complete Session
        </button>
      </SurfaceCard>
    </div>
  );
}

                  <div key={block.id || block.label} className="card-sharp p-3 space-y-1">
                    <div className="text-xs font-semibold uppercase tracking-[0.14em] text-neutral-500">{block.weeks}</div>
                    <div className="text-sm font-semibold text-neutral-100">{block.label}</div>
                    <div className="text-xs text-neutral-400">{block.focus}</div>
