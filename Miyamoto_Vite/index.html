<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>MIYAMOTO | AI Performance Coach</title>
    <!-- We will let Vite inject the CSS and JS -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- PWA Install Prompt Logic (Optional but helpful) -->
    <div id="pwa-install-banner" style="display: none; position: fixed; bottom: 80px; left: 16px; right: 16px; background: #171717; border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 12px; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
      <div style="font-weight: 600; color: #f5f5f5; font-size: 14px; margin-bottom: 4px;">Install App</div>
      <div style="color: #a3a3a3; font-size: 12px; margin-bottom: 12px;">Add this app to your home screen for the best experience.</div>
      <div style="display: flex; gap: 8px;">
        <button id="pwa-install-btn" style="background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 12px; border: none;">Install</button>
        <button id="pwa-dismiss-btn" style="background: transparent; color: #a3a3a3; padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 12px; border: 1px solid rgba(255,255,255,0.1);">Maybe Later</button>
      </div>
    </div>

    <script>
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        deferredPrompt = e;
        const banner = document.getElementById('pwa-install-banner');
        if (banner) {
           banner.style.display = 'block';
           
           document.getElementById('pwa-install-btn').addEventListener('click', () => {
             banner.style.display = 'none';
             deferredPrompt.prompt();
             deferredPrompt.userChoice.then((choiceResult) => {
               if (choiceResult.outcome === 'accepted') {
                 console.log('User accepted the A2HS prompt');
               } else {
                 console.log('User dismissed the A2HS prompt');
               }
               deferredPrompt = null;
             });
           });
           
           document.getElementById('pwa-dismiss-btn').addEventListener('click', () => {
             banner.style.display = 'none';
           });
        }
      });
    </script>
  </body>
</html>
